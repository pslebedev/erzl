suite_id: 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d
suite_name: Сервисные алгоритмы - Позитивные

cases:
  - case_id: c3d4e5f6-a7b8-4c9d-0e1f-2a3b4c5d6e7f
    name: "Успешное закрытие просроченной заявки (отсчет от date_apply_reg)"
    description: "Проверка закрытия заявки, если прошло больше expirationPeriod дней с момента date_apply_reg (countFromDateExpired = 1)"
    steps:
      - action: "Создать заявку прикрепления со статусом 'arDraft' и date_apply_reg = (сегодня - expirationPeriod - 1 день)"
        expected: "Заявка успешно создана в БД"
      - action: "Запустить джобу ExpiredAttachmentRequestScheduleFiredEvent"
        expected: "Событие успешно обработано"
      - action: "Проверить статус заявки в БД"
        expected: "Статус заявки изменен на 'arApproved' (или целевой статус закрытия)"

  - case_id: d4e5f6a7-b8c9-4d0e-1f2a-3b4c5d6e7f8a
    name: "Успешное закрытие просроченной заявки (отсчет от date_doctor_decision)"
    description: "Проверка закрытия заявки, если отсчет идет от решения врача (countFromDateExpired = 0)"
    steps:
      - action: "Создать заявку со статусом 'arDraft' и date_doctor_decision = (сегодня - expirationPeriod - 1 день)"
        expected: "Заявка успешно создана"
      - action: "Запустить джобу с параметром countFromDateExpired = 0"
        expected: "Джоба отработала без ошибок"
      - action: "Проверить статус заявки"
        expected: "Заявка переведена в статус просроченной/закрытой"

  - case_id: e5f6a7b8-c9d0-4e1f-2a3b-4c5d6e7f8a9b
    name: "Обработка лимита заявок (maxCountRows)"
    description: "Проверка, что алгоритм обрабатывает не более maxCountRows записей за один запуск"
    steps:
      - action: "Создать количество просроченных заявок, превышающее maxCountRows (например, maxCountRows + 5)"
        expected: "Заявки созданы"
      - action: "Запустить алгоритм поиска просроченных заявок"
        expected: "Алгоритм отработал успешно"
      - action: "Проверить количество измененных заявок"
        expected: "Статус изменился ровно у maxCountRows заявок, остальные остались в прежнем статусе"

  - case_id: f6a7b8c9-d0e1-4f2a-3b4c-5d6e7f8a9b0c
    name: "Проверка граничного условия (ровно expirationPeriod дней)"
    description: "Заявка, которой исполнилось ровно expirationPeriod дней, еще не считается просроченной"
    steps:
      - action: "Создать заявку с датой отсчета ровно (сегодня - expirationPeriod дней)"
        expected: "Заявка создана"
      - action: "Запустить алгоритм"
        expected: "Алгоритм отработал успешно"
      - action: "Проверить статус заявки"
        expected: "Статус заявки НЕ изменился, заявка не закрыта"
