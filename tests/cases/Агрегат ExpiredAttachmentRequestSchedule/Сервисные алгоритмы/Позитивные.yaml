suite_id: 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d
suite_name: EARS_Позитивные
description: Детальная проверка всех успешных путей поиска и перевода статусов
created_at: '2026-03-12T11:00:00Z'
status: new
created_by: QA_Gemini
test_cases:
  - case_id: 44c9b132-231a-4f51-8e99-4d6f0b83648a
    title: 1-2. Проверка запуска поиска. Первый запуск (создание записи в run_control)
    priority: high
    steps:
      - action: 'Дождаться интервала проверки controlTimeInterval'
        expected_result: 'В srv.run_control создана запись code=EARS, is_running=1'

  - case_id: d9876543-2109-4321-8765-0123456789ab
    title: 2. Проверка запуска поиска. Не первый запуск (обновление записи в run_control)
    priority: high
    steps:
      - action: 'Запуск при наличии старой записи с is_running=0 и пройденным startInterval'
        expected_result: 'start_date обновлен, is_running установлен в 1'

  - case_id: 11c52acc-2662-4270-a7d6-79c0dc6f9b4b
    title: 3. Проверка создания записи в расписании (attach.expired_attachment_request_schedule)
    priority: high
    steps:
      - action: 'Запуск при отсутствии записи на текущую дату в таблице расписания'
        expected_result: 'Создана новая запись: status=1 (в работе), все счетчики (found, change, error) = 0'

  - case_id: a1b2c3d4-e5f6-4a5b-8c9d-0e1f2a3b4c5d
    title: 6.1. Обработка просроченных Черновиков (arDraft -> arArchived)
    priority: high
    pre-conditions:
      - action: 'В базе есть arDraft, поданный более archivedPeriod дней назад'
    steps:
      - action: 'Выполнить шаг 6 алгоритма для данного заявления'
        expected_result: |-
          1. Вызвана команда ExpireAttachmentRequestCommand
          2. Новый статус заявления: arArchived
          3. attach_request_count_change увеличен на 1
          4. В логе srv.expired_attach_request_change_log создан тип 'archived'

  - case_id: b2c3d4e5-f6a7-4b8c-9d0e-1f2a3b4c5d6e
    title: 6.2. Обработка просроченных ГВ (arCreated -> arExpiredDoc)
    priority: high
    pre-conditions:
      - action: 'В базе есть arCreated, поданный более expirationDocPeriod дней назад'
    steps:
      - action: 'Выполнить шаг 6 алгоритма для данного заявления'
        expected_result: |-
          1. Новый статус заявления: arExpiredDoc
          2. В логе srv.expired_attach_request_change_log создан тип 'expiredDoc'
          3. Счетчик attach_request_count_change в расписании +1

  - case_id: c3d4e5f6-a7b8-4c9d-0e1f-2a3b4c5d6e7f
    title: 6.3. Обработка просроченных СМО (arSmoApproving -> arExpiredSMO)
    priority: high
    pre-conditions:
      - action: 'В базе есть arSmoApproving (причина addressChange), дата решения врача более expirationSmoPeriod дней назад'
    steps:
      - action: 'Выполнить шаг 6 алгоритма для данного заявления'
        expected_result: |-
          1. Новый статус заявления: arExpiredSMO
          2. В логе srv.expired_attach_request_change_log создан тип 'expiredSmo'

  - case_id: d4e5f6a7-b8c9-4d0e-1f2a-3b4c5d6e7f8a
    title: 6.5. Проверка цикличности. Обработка следующего заявления
    priority: medium
    pre-conditions:
      - action: 'GetExpiredAttachmentRequestQuery вернул список из нескольких заявлений'
    steps:
      - action: 'Завершить обработку первого заявления'
        expected_result: 'Система проверяет условия (mode=1, время позволяет) и переходит к обработке следующего ID из списка'

  - case_id: e5f6a7b8-c9d0-4e1f-2a3b-4c5d6e7f8a9b
    title: 7-8. Фиксация успешного завершения всего цикла
    priority: high
    steps:
      - action: 'Все записи из GetExpiredAttachmentRequestQuery обработаны'
        expected_result: |-
          1. attach.expired_attachment_request_schedule.status = 2 (успех)
          2. srv.run_control.is_running = 0
          3. end_date заполнена текущим временем