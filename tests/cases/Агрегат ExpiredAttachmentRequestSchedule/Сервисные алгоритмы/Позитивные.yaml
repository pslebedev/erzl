  suite_id: 1a2b3c4d-5e6f-7a8b-9c0d-1e2f3a4b5c6d
  suite_name: EARS_Позитивные
  description: Проверка успешного выполнения алгоритма поиска просроченных заявлений
  created_at: '2026-03-13T10:00:00Z'
  status: new
  created_by: Inna Zaikovskaya
  test_cases:
    - case_id: 2b3c4d5e-6f7a-8b9c-0d1e-2f3a4b5c6d7e
      title: 1-2. Проверка запуска поиска просроченных заявлений. Первый запуск
      description: Проверка старта процесса, когда записей в srv.run_control еще нет
      priority: high
      steps:
        - action: 'Дождаться интервала expiredAttachmentRequestScheduleFiredAlg.run.controlTimeInterval'
          expected_result: |-
            Система фиксирует начало работы, создает новую запись:
            srv.run_control.code = 'EARS'
            srv.run_control.host = хост, запустивший команду;
            srv.run_control.start_date = current_timestamp;
            srv.run_control.end_date = null;
            srv.run_control.is_running = 1;
            srv.run_control.last_date = current_timestamp.
      pre-conditions:
        - action: |-
            Выполнены условия:
            1) run.mode = 1
            2) текущее время >= run.beginTime и <= run.endTime
            3) В таблице SRV.RUN_CONTROL нет записи с CODE = 'EARS'
          expected_result: '-'
      iterations: []

    - case_id: 3c4d5e6f-7a8b-9c0d-1e2f-3a4b5c6d7e8f
      title: 1-2. Проверка запуска поиска просроченных заявлений. Команда зависла
      description: Проверка сброса зависшей команды в run_control
      priority: high
      steps:
        - action: 'Дождаться интервала expiredAttachmentRequestScheduleFiredAlg.run.controlTimeInterval'
          expected_result: '-'
        - action: |-
            Обнаружена зависшая запись в svr.run_control
            srv.run_control.last_date < текущие дата/время - run.resetPeriod
            srv.run_control.code = 'EARS'
          expected_result: |-
            Система обновляет запись:
            srv.run_control.start_date = current_timestamp;
            srv.run_control.end_date = null;
            srv.run_control.is_running = 1;
            srv.run_control.last_date = current_timestamp.
      pre-conditions:
        - action: 'Условия времени и режима соблюдены. В БД есть зависшая запись EARS.'
          expected_result: '-'
      iterations: []

    - case_id: 4d5e6f7a-8b9c-0d1e-2f3a-4b5c6d7e8f90
      title: "3. Фиксация расписания. Запись зависла (статус 1)"
      description: Сброс зависшей записи в expired_attachment_request_schedule
      priority: high
      steps:
        - action: |-
            Найдена зависшая запись (status = 1) на текущую дату.
          expected_result: |-
            Система сбрасывает зависшую запись:
            date_end = current_timestamp
            status = 3
            error = AT_EARS_003
            change_date = current_timestamp
            Переходит к поиску новых записей.
      iterations: []

    - case_id: 5e6f7a8b-9c0d-1e2f-3a4b-5c6d7e8f90a1
      title: "3. Фиксация расписания. Создание новой записи"
      description: Создание записи в attach.expired_attachment_request_schedule
      priority: high
      steps:
        - action: |-
            Не найдена запись со статусом 0, 1 или 2 на текущую дату.
          expected_result: |-
            Создается новая запись:
            id = авто
            date_process = текущая дата без времени
            status = 1
            date_start = current_timestamp
            attach_request_count_found = 0
            attach_request_count_change = 0
            attach_request_count_error = 0
      iterations: []

    - case_id: 6f7a8b9c-0d1e-2f3a-4b5c-6d7e8f90a1b2
      title: "4. Проверка заполнения обязательных параметров (Архив, ГВ, СМО)"
      description: Успешная валидация параметров для включенных поисков
      priority: high
      steps:
        - action: |-
            В config для включенных поисков (findArchivedRequest=1, findExpiredDocRequest=1, findExpiredSmoRequest=1) заполнены соответствующие expirationPeriod и countFromDateApply.
          expected_result: 'Переход на шаг 5'
      iterations: []

    - case_id: 7a8b9c0d-1e2f-3a4b-5c6d-7e8f90a1b2c3
      title: "5-6. Обработка Архивных заявлений (arDraft -> arArchived)"
      description: Поиск и изменение статуса архивных заявлений
      priority: high
      steps:
        - action: 'Сформировано событие ExpiredAttachmentRequestScheduleFiredEvent для arDraft. Найдены заявления.'
          expected_result: |-
            1) Обновляется счетчик attach_request_count_found.
            2) attachRequestStatus меняется на arArchived.
            3) Формируется ExpireAttachmentRequestEvent с operationTypeForTopic = archived.
            4) Сохраняется лог в srv.expired_attach_request_change_log.
            5) Обновляется attach_request_count_change.
      pre-conditions:
        - action: 'findArchivedRequest=1, в БД есть заявления arDraft, подходящие под период.'
          expected_result: '-'
      iterations: []

    - case_id: 8b9c0d1e-2f3a-4b5c-6d7e-8f90a1b2c3d4
      title: "5-6. Обработка заявлений ГВ (arCreated -> arExpiredDoc)"
      description: Поиск и изменение статуса заявлений ГВ
      priority: high
      steps:
        - action: 'Сформировано событие для arCreated. Найдены заявления.'
          expected_result: |-
            attachRequestStatus меняется на arExpiredDoc.
            operationTypeForTopic = expiredDoc.
            Логируется успех, обновляются счетчики.
      pre-conditions:
        - action: 'findExpiredDocRequest=1, в БД есть заявления arCreated.'
          expected_result: '-'
      iterations: []

    - case_id: 9c0d1e2f-3a4b-5c6d-7e8f-90a1b2c3d4e5
      title: "5-6. Обработка заявлений СМО (arSmoApproving -> arExpiredSMO)"
      description: Поиск и изменение статуса заявлений СМО
      priority: high
      steps:
        - action: 'Сформировано событие для arSmoApproving (и arApproved) c attachOpenCode=addressChange.'
          expected_result: |-
            attachRequestStatus меняется на arExpiredSMO.
            operationTypeForTopic = expiredSmo.
            Логируется успех, обновляются счетчики.
      pre-conditions:
        - action: 'findExpiredSmoRequest=1, в БД есть заявления arSmoApproving.'
          expected_result: '-'
      iterations: []

    - case_id: 0d1e2f3a-4b5c-6d7e-8f90-a1b2c3d4e5f6
      title: "7-8. Проверка завершения работы команды и процесса"
      description: Корректное закрытие сессии работы алгоритма
      priority: high
      steps:
        - action: 'Все записи обработаны, алгоритм завершает работу'
          expected_result: |-
            1) В attach.expired_attachment_request_schedule: status = 2, date_end = current_timestamp.
            2) В srv.run_control: end_date = current_timestamp, is_running = 0.
      iterations: []

