suite_id: da03fadc-71df-4c55-a501-ecec854a8509
suite_name: EARS_Проверка_параметров
description: Проверка граничных значений и типов параметров конфигурации
created_at: '2026-03-13T10:10:30Z'
status: new
created_by: Inna Zaikovskaya
test_cases:
  - case_id: 5735ba59-3c88-4320-83ff-d906991208de
    title: Проверка параметра expiredAttachmentRequestScheduleFiredAlg.run.controlTimeInterval
    description: Частота запуска проверок
    priority: medium
    steps:
      - action: 'Установить controlTimeInterval = 5 минут'
        expected_result: 'Система инициирует проверку условий запуска ровно раз в 5 минут'

  - case_id: 33d14613-6dac-416b-bc8b-30648156afd7
    title: Проверка параметра expiredAttachmentRequestScheduleFiredAlg.run.startInterval
    description: Интервал между успешными запусками (защита от спама)
    priority: medium
    steps:
      - action: 'Текущее время - SRV.RUN_CONTROL.START_DATE < run.startInterval'
        expected_result: 'Процесс поиска не стартует, ожидается истечение интервала'

  - case_id: f484bb58-9d3a-4384-b2cc-06a0e1219312
    title: Проверка параметра expiredAttachmentRequestScheduleFiredAlg.run.resetPeriod
    description: Детектирование "зависших" процессов
    priority: high
    steps:
      - action: 'Сымитировать зависание: srv.run_control.last_date < текущие дата/время минус run.resetPeriod'
        expected_result: 'Система классифицирует процесс как зависший, сбрасывает статус (ошибка AT_EARS_003) и перезапускает обработку'

  - case_id: d5ae75b4-656f-473b-905e-93ad0d154f4f
    title: Проверка параметра expiredAttachmentRequestScheduleFiredAlg.queryMaxCountRows
    description: Проверка дефолтного значения при некорректном лимите
    priority: medium
    steps:
      - action: 'Передать queryMaxCountRows = <param>'
        expected_result: 'При вызове GetExpiredAttachmentRequestQuery передается maxCountRows = 100'
    iterations:
      - iteration_id: '1'
        params:
          - name: param
            value: пусто (null)
      - iteration_id: '2'
        params:
          - name: param
            value: 'строка "сто"'
      - iteration_id: '3'
        params:
          - name: param
            value: '-5 (меньше нуля)'

  - case_id: 1bfc9c3f-e791-4fb8-8fa3-4ed6141d65a9
    title: Изолированное выполнение поиска только по Архиву
    description: Проверка флага findArchivedRequest
    priority: high
    steps:
      - action: 'Установить findArchivedRequest=1, findExpiredDocRequest=0, findExpiredSmoRequest=0'
        expected_result: 'Запрашиваются и обрабатываются только заявления со статусом arDraft. ГВ и СМО игнорируются.'

  - case_id: c7535112-9ea9-454a-bf6e-1f81806986ae
    title: Изолированное выполнение поиска только по ГВ
    description: Проверка флага findExpiredDocRequest
    priority: high
    steps:
      - action: 'Установить findArchivedRequest=0, findExpiredDocRequest=1, findExpiredSmoRequest=0'
        expected_result: 'Запрашиваются и обрабатываются только заявления со статусом arCreated. Архив и СМО игнорируются.'