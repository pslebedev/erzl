suite_id: a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d
suite_name: EARS_Негативные
description: Проверка альтернативных сценариев и формирования ошибок (AT_EARS_001 - AT_EARS_005)
created_at: '2026-03-13T10:05:00Z'
status: new
created_by: Inna Zaikovskaya
test_cases:
  - case_id: 1816c42c-2460-4790-8e58-88d086dad71e
    title: 1. Проверка НЕ возможности запуска процесса поиска просроченных заявлений
    description: Алгоритм не должен запускаться, если условия не выполнены
    priority: high
    steps:
      - action: 'Дождаться интервала expiredAttachmentRequestScheduleFiredAlg.run.controlTimeInterval'
        expected_result: 'Процесс не запускается, новые записи в srv.run_control не создаются'
    iterations:
      - iteration_id: '1'
        params:
          - name: param
            value: Режим работы выключен (expiredAttachmentRequestScheduleFiredAlg.run.mode = 0)
      - iteration_id: '2'
        params:
          - name: param
            value: Текущее время меньше времени начала (текущее время < run.beginTime)
      - iteration_id: '3'
        params:
          - name: param
            value: Текущее время больше времени окончания (текущее время > run.endTime)

  - case_id: 4b0f1ab1-92a0-41a8-ad76-eaa6feb704b8
    title: "AC.1 Проверка формирования ошибки AT_EARS_001 при отсутствии обязательных параметров"
    description: Валидация параметров поиска (шаг 4)
    priority: high
    steps:
      - action: Запуск процесса при некорректной конфигурации <param>
        expected_result: |-
          В таблице attach.expired_attachment_request_schedule фиксируется:
          date_end = current_timestamp
          status = 3
          error = "AT_EARS_001 - Невозможно продолжить поиск . Параметр(ы) {0} не заполнен(ы) или заполнен(ы) неверно."
          Переход к завершению работы (шаг 7).
    iterations:
      - iteration_id: '1'
        params:
          - name: param
            value: findArchivedRequest=1, но archivedPeriod не заполнен
      - iteration_id: '2'
        params:
          - name: param
            value: findArchivedRequest=1, но archivedPeriod <= 0
      - iteration_id: '3'
        params:
          - name: param
            value: findArchivedRequest=1, но countFromDateApplyArchived не равен 0 или 1 (например, 2)
      - iteration_id: '4'
        params:
          - name: param
            value: findExpiredDocRequest=1, но expirationDocPeriod не заполнен
      - iteration_id: '5'
        params:
          - name: param
            value: findExpiredDocRequest=1, но countFromDateApplyExpiredDoc не равен 0 или 1
      - iteration_id: '6'
        params:
          - name: param
            value: findExpiredSmoRequest=1, но expirationSmoPeriod строка (не integer)
      - iteration_id: '7'
        params:
          - name: param
            value: findExpiredSmoRequest=1, но countFromDateApplyExpiredSmo не равен 0 или 1

  - case_id: 640c35cd-ac7d-4033-9a08-6ff24ccb572d
    title: "AC.2 Формирование непредвиденной ошибки БД при поиске GetExpiredAttachmentRequestQuery"
    description: Обработка падения селекта
    priority: high
    steps:
      - action: 'При выполнении GetExpiredAttachmentRequestQuery получена непредвиденная ошибка (например, таймаут БД)'
        expected_result: |-
          В таблице attach.expired_attachment_request_schedule фиксируется:
          date_end = current_timestamp
          status = 3
          error = "AT_EARS_002 - При выполнении поиска получена ошибка: {0}."

  - case_id: 080553db-1105-4102-b6f9-9f97b8046079
    title: 6.4 Проверка формирования ошибки AT_EARS_005, если приложение остановлено
    description: Остановка приложения в процессе итерации по списку заявлений
    priority: high
    steps:
      - action: 'На шаге 6.4 (после обработки очередного заявления) перевести приложение в статус "Остановлено"'
        expected_result: |-
          Система прерывает цикл.
          Формирует ошибку с кодом AT_EARS_005.
          Переходит на шаг 7 (status = 3).

  - case_id: e28054b5-fd74-4ae0-80e1-d1ad66ced40c
    title: 6.4 Проверка формирования ошибки AT_EARS_004, если продолжить работу не разрешено
    description: Наступление нерабочего времени в процессе итерации
    priority: high
    steps:
      - action: 'На шаге 6.4 изменить системное время так, чтобы текущее время стало > expiredAttachmentRequestScheduleFiredAlg.run.endTime'
        expected_result: |-
          Система прерывает цикл.
          Формирует ошибку с кодом AT_EARS_004.
          Переходит на шаг 7 (status = 3).

