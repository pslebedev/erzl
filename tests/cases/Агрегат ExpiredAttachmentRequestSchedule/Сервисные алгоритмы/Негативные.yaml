suite_id: 8c7b6a5d-4e3f-2a1b-0c9d-8e7f6a5b4c3d
suite_name: Сервисные алгоритмы - Негативные

cases:
  - case_id: 55e6f7a8-b9c0-4d1e-2f3a-4b5c6d7e8f9a
    name: "Ошибка валидации при отрицательном expirationPeriod"
    description: "Проверка, что алгоритм не запускается и выдает ошибку, если период просрочки указан меньше нуля"
    steps:
      - action: "Передать конфигурацию с expirationPeriod = -5"
        expected: "Конфигурация передана"
      - action: "Инициализировать агрегат ExpiredAttachmentRequestSchedule"
        expected: "Ошибка инициализации/валидации: expirationPeriod не может быть отрицательным"

  - case_id: 66f7a8b9-c0d1-4e2f-3a4b-5c6d7e8f9a0b
    name: "Ошибка при некорректном лимите maxCountRows"
    description: "Лимит обрабатываемых записей за один запуск должен быть больше нуля"
    steps:
      - action: "Передать в конфигурации maxCountRows = 0 (или -1)"
        expected: "Конфигурация передана"
      - action: "Запустить джобу ExpiredAttachmentRequestScheduleFiredEvent"
        expected: "Выброшено исключение или ошибка валидации: лимит заявок должен быть > 0"

  - case_id: 77a8b9c0-d1e2-4f3a-4b5c-6d7e8f9a0b1c
    name: "Отсутствие обязательного параметра dateProcess"
    description: "Проверка обработки пустого значения даты запуска алгоритма (профилактика NullPointerException)"
    steps:
      - action: "Передать конфигурацию без указания dateProcess (null)"
        expected: "Конфигурация передана"
      - action: "Запустить алгоритм"
        expected: "Выброшена понятная ошибка об отсутствии обязательного параметра, алгоритм прервал работу корректно"

  - case_id: 88b9c0d1-e2f3-4a4b-5c6d-7e8f9a0b1c2d
    name: "Некорректный флаг countFromDateExpired"
    description: "Флаг отсчета даты должен принимать строго определенные значения (0 - решение врача, 1 - дата подачи)"
    steps:
      - action: "Передать в конфигурации countFromDateExpired = 99"
        expected: "Конфигурация передана"
      - action: "Запустить поиск просроченных заявок"
        expected: "Ошибка валидации параметра: неизвестный тип отсчета даты"

  - case_id: 99c0d1e2-f3a4-4b5c-6d7e-8f9a0b1c2d3e
    name: "Неизвестный статус attachRequestStatusCode"
    description: "Попытка поиска заявок по несуществующему коду статуса"
    steps:
      - action: "Передать конфигурацию с attachRequestStatusCode = 'arUnknownStatus123'"
        expected: "Конфигурация передана"
      - action: "Запустить алгоритм поиска"
        expected: "Алгоритм не находит ни одной заявки и корректно завершает работу (или выдает ошибку валидации статуса на старте)"
