  - case_id: 69b02e5c-4c26-4721-9142-6a3ab8a15c25
    title: AC.2 Проверка получения ошибки при некорректном заполнении входных параметров
    description: Описание
    priority: high
    steps:
      - action: Действие <value>
        expected_result: Ожидаемый результат <error>
    iterations:
      - iteration_id: '1'
        params:
          - name: value
            value: ''
          - name: error
            value: 'Метод возвращает ответ с кодом 400/Код ошибки: InvalidParameterPageSize/ Тип исключения: ValidationException'
      - iteration_id: '2'
        params:
          - name: value
            value: pageSize превышает максимальное значение (restQuery.maxPageSize)
          - name: error
            value: 'Метод возвращает ответ с кодом 400/ Код ошибки: InvalidParameterPageSize/ Тип исключения: ValidationException '
      - iteration_id: '3'
        params:
          - name: value
            value: pageSize = -1 (отрицательное значение)
          - name: error
            value: 'Метод возвращает ответ с кодом 400/ Код ошибки: InvalidParameterPageSize/ Тип исключения: ValidationException '
      - iteration_id: '4'
        params:
          - name: value
            value: page = -1 (ниже минимального значения)
          - name: error
            value: 'Метод возвращает ответ с кодом 400 / Код ошибки: InvalidParameterPage/ Тип исключение: ValidationException  '
      - iteration_id: '5'
        params:
          - name: value
            value: Одновременная ошибка pageSize=0 и page=-1
          - name: error
            value: 'Метод возвращает ответ с кодом 400/ Коды ошибок: InvalidParameterPageSize и InvalidParameterPage/ Тип исключения: AggregatedBusinessException '
  - case_id: 523c7299-c93f-4b2f-ae65-013894acdc91
    title: АС.3. Проверка работы , когда прикрепление не найдено
    description: ''
    priority: medium
    steps:
      - action: |-
          Вызвать метод GetAttachmentsQuery с параметрами:
             - insuredPersonId: ID застрахованного лица без прикреплений
             - pageSize: валидное значение
             - page: валидное значение
        expected_result: |
          Метод возвращает ответ с кодом 200
          - Тело ответа содержит пустой список прикреплений
    pre-conditions:
      - action: В системе отсутствуют прикрепления для указанного insuredPersonId
        expected_result: ''
