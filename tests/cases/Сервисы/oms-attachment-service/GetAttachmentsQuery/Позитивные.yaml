  - case_id: 8f917f70-74e3-40e9-8473-f9b7eeca7c5a
    title: Проверка получения списка прикреплений с обязательными параметрами
    description: Описание
    priority: high
    pre-conditions:
      - action: У ЗЛ есть прикрепления со статусами 'A_CREATING', 'A_CREATED', 'A_CLOSING', 'A_CLOSED', 'A_CANCELING'
        expected_result: Результат предусловия
    steps:
      - action: |
          "Вызвать метод GetAttachmentsQuery с параметрами:
          - insuredPersonId: валидный ID застрахованного лица
          - pageSize: значение в диапазоне от 1 до restQuery.maxPageSize
          - page: значение >= 0"
        expected_result: |
          "Метод возвращает ответ с кодом 200
          Тело ответа содержит список прикреплений
          Прикрепления отсортированы по:
            1. Код профиля прикрепления (по возрастанию)
            2. Признак активности (сначала true)
            3. Дата начала прикрепления (по убыванию)
            4. Внутренний идентификатор (по убыванию)"
  - case_id: 1ed46aef-7f02-48f3-aa67-662e2a71b835
