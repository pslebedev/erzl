    description: Описание
    priority: high
    pre-conditions:
      - action: В системе существуют активные и неактивные прикрепления для указанного insuredPersonId
        expected_result: Результат предусловия
    steps:
      - action: |
          "Вызвать метод GetAttachmentsQuery с параметрами:
          - insuredPersonId: валидный ID застрахованного лица
          - isActive: true
          - pageSize: валидное значение
          - page: валидное значение"
        expected_result: |
          "Метод возвращает ответ с кодом 200.
          В ответе содержатся только активные прикрепления (is_active = true).
          Прикрепления соответствуют условиям поиска."
