    title: Проверка соответствию справочнику значений переданных параметров
    description: "Проверка ошибки AT_IFAR_003 при передаче недопустимого значения <param>"
    priority: low
    steps:
      - action: "Отправить сообщение <eventName> в топик  AttachmentRequestCommandTopic  с параметром <param> со значением <value>"
        expected_result: "Система сохраняет в таблицу SRV.attach_request_command_topic_receive_log  ошибку \"AT_IFAR_003 ФЛК не пройден. Переданное значение параметра <наименование атрибута> = <значение атрибута> не входит в список разрешенных: <перечень разрешенных значений>. ИД сообщения = <ИД сообщения (message_id)>.\""
    iterations:
    - iteration_id: '1'
      params:
      - name: eventName
        value: "FerzlAttachmentCreatedResultEvent"
      - name: param
        value: operationType  
      - name: "value" 
        value: INVALID_TYPE
