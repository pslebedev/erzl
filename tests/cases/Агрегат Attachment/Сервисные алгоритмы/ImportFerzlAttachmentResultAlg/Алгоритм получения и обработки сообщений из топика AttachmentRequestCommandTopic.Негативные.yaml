  - case_id: 86f5266c-fd86-48d8-9cd5-d948332072aa
    title: "Обработка сообщения с пустым ключом или телом"
    description: "Проверка ошибки AT_IFAR_012 при пустом ключе сообщения или пустом теле"
    priority: high
    pre-conditions:
      - action: "В системе существует прикрепление"
    steps:
      - action: "Отправить сообщение в топик AttachmentRequestCommandTopic с пустым ключом"
        expected_result: "Сообщение успешно доставлено в топик"
      - action: "Проверить логирование ошибки "
        expected_result: "Найдена запись с status = 6 и error, содержащей текст ошибки \"AT_IFAR_012 Не указан ключ сообщения или текст сообщения пустой: топик = <имя топика>, ИД сообщения = <ИД сообщения (message_id)>.\""
  
  - case_id: 751ef757-510c-424c-80c3-18c923105e9a
    title: "Обработка сообщения с невалидным JSON"
    description: "Проверка ошибки AT_IFAR_001 при некорректном синтаксисе JSON"
    priority: high
    pre-conditions:
      - action: "В системе существует прикрепление с известным attach_ext_id"
    steps:
      - action: "Отправить сообщение в топик AttachmentRequestCommandTopic с невалидным JSON в теле (например, {data: \"test\")"
        expected_result: "Сообщение успешно доставлено в топик"     
      - action: "Проверить наличие записей c message_key отправленного сообщения  в srv.attach_request_command_topic_receive_log"
        expected_result: "Найдена запись с status = 0 и error, содержащей текст ошибки \"AT_IFAR_001: Не удалось распарсить сообщение: топик = AttachmentRequestCommandTopic, ИД сообщения = ...\""     

