  - case_id: a1b2c3d4-5e6f-4a5b-8c9d-0e1f2a3b4c5d
    title: Проверка обрезания полей descr, dsource, dsourceType до 255 символов при сохранении в БД
    description: При получении события FerzlAttachmentClosedResultEvent значения полей descr, dsource, dsourceType, превышающие длину поля в БД (255 символов), должны обрезаться до 255 символов при обновлении записи в таблице attachment.
    priority: medium
    steps:
      - action: 'Отправить сообщение в топик AttachmentRequestCommandTopic со сведениями о подтверждении аннулирования прикрепления, в котором поля descr, dsource, dsourceType содержат значения длиной более 255 символов '
        expected_result: |-
          Система выполняет обновление сведений прикрепления в таблице attachment.
          Значения полей descr, dsource, dsourceType обрезаются до 255 символов и сохраняются в БД (длина поля в БД — 255 символов).
    pre-conditions:
      - action: 'Отправить сообщение в топик AttachmentExternalSyncCommandTopic со сведениями о созданиии прикрепления '
        expected_result: В бд создана запись о прикреплении со статусом A_CREATING
      - action: 'Отправить сообщение в топик AttachmentExternalSyncCommandTopic со сведениями о аннулировании прикрепления '
        expected_result: В бд создана запись о прикреплении со статусом A_CANCELING
