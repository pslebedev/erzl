  - case_id: 860cbd6c-4af6-4f08-ac85-fc78cbc788bd
    title: Проверка формирования сообщение для публикации события FerzlAttachmentClosedResultEvent о аннулирования прикрепления
    description: ''
    priority: medium
    steps:
      - action: 'Отправить сообщение в топик AttachmentExternalSyncCommandTopic со сведениями о аннулировании прикрепления '
        expected_result: |-
          Система формирует сообщение для публикации события AttachmentCanceledEvent - Прикрепление аннулировано.

          При формировании сообщения указывается:

          eventName = AttachmentCancelledEvent 
          operationType = CANCELLED
          attachId = ИД прикрепления, найденного на шаге 2
      - action: Перейти в таблицу srv.attach_event_topic_send
        expected_result: Система добавляет сведения для отправки сообщения в таблицу srv.attach_event_topic_send - Сведения для отправки в топик AttachmentEventTopic
    pre-conditions:
      - action: 'Отправить сообщение в топик AttachmentExternalSyncCommandTopic со сведениями о созданиии прикрепления '
        expected_result: В бд создана запись о прикреплении со статусом A_CREATING
      - action: 'Отправить сообщение в топик AttachmentExternalSyncCommandTopic со сведениями о аннулировании прикрепления '
        expected_result: В бд создана запись о прикреплении со статусом A_CANCELING
