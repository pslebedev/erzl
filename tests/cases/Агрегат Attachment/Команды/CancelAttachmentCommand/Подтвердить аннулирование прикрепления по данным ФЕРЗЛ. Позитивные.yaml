suite_id: 65c8fb46-8edb-4ade-9ddf-721f9d56f701
suite_name: Подтвердить аннулирование прикрепления по данным ФЕРЗЛ. Позитивные
description: Команда предназначена для обработки событий, содержащих сведения об успешном аннулировании (закрытии) прикрепления в ФЕРЗЛ Событие поступает в сообщении FerzlAttachmentClosedResultEvent из топика AttachmentRequestCommandTopic
created_at: '2025-12-18T07:45:32Z'
status: new
created_by: p.lebedev
test_cases:
  - case_id: b7a10404-c640-4293-afe0-b732906420b5
    title: Проверка аннулирования прикрепления в БД для события FerzlAttachmentClosedResultEvent
    description: 'Проверка выплнения обновления сведений о прикреплениив таблице attachment '
    priority: high
    steps:
      - action: 'Отправить сообщение в топик AttachmentRequestCommandTopic со сведениями о подтверждении об аннулировании прикрепления '
        expected_result: |
          Система выполняет обновление сведений прикрепления в таблице attachment (Прикрепление):
          attachment.id = data/attachmentResult/ferzlResponseAttach/attachStatus
          ref_attach_status_ferzl_code = data/attachmentResult/ferzlResponseAttach/attachStatus
          ref_attach_status_code_attach = A_CLOSED
          ferzl_transferred = 2
          is_active = 0
          change_date = current_timestamp
          attach_change_date = current_timestamp
    pre-conditions:
      - action: 'Отправить сообщение в топик AttachmentExternalSyncCommandTopic со сведениями о созданиии прикрепления '
        expected_result: В бд создана запись о прикреплении со статусом A_CREATING
      - action: 'Отправить сообщение в топик AttachmentExternalSyncCommandTopic со сведениями о аннулировании прикрепления '
        expected_result: В бд создана запись о прикреплении со статусом A_CANCELING
