  - case_id: 589a6bf2-bdef-4b2f-82f0-fe974b48f8fc
    title: Проверка сохранения истории в БД при закрытии прикрепления для события FerzlAttachmentClosedResultEvent
    description: ''
    priority: medium
    steps:
      - action: Отправить событие событие FerzlAttachmentClosedResultEvent для закрытия актуального прикрепления в БД
        expected_result: |
