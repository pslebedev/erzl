test_cases:
  - case_id: 62eeb2a6-d492-41a5-a35d-9364109c7bc3
    title: Проверка обновления записи прикрепления в БД (таблица attachment)
    description: ""
    priority: high
    pre-conditions:
      - action: Отправить сообщение в топик AttachmentExternalEventTopic, operationType = CREATED
        expected_result: В БД есть прикрепление со статусом != A_CREATED
    steps:
      - action: Отправить событие FerzlAttachmentCreatedResultEvent с валидным attachId
        expected_result: |
          В таблице attachment обновлены поля:
          ref_attach_status_code : A_CREATED
          ref_attach_status_ferzl_code : data.attachmentResult.ferzlResponseAttach.attachStatus
          ferzl_transferred : 2
          is_active : 1
          change_date : NOW()
          attach_change_date : NOW()

  - case_id: 0a3c578b-4b03-4891-9d50-e0e50f520308
    title: Проверка создания записи в attachment_history
    priority: medium
    pre-conditions:
      - action: Отправить сообщение в топик AttachmentExternalEventTopic, operationType = CREATED
        expected_result: В БД есть прикрепление со статусом ≠ A_CREATED. В таблице attach_event_topic_send_log нет closing_attachment_id по этому requestMessageId (или параметр конфигурации для автозакрытия = 0).
    steps:
      - action: Отправить событие FerzlAttachmentCreatedResultEvent с валидным attachId.
        expected_result: |
          Создана запись со значениями:

            Поле	Значение
            attachment_id	= 
            change_source	metadata/systemCode
            change_by_user	null
            change_event	AttachmentCreatedEvent
            ref_mo_mgfoms_core_mo_code_f032	взято из mo_info_attach.ref_mo_mgfoms_core_code_f032
            ref_f002_smo_code	взято из person_info.ref_f002_smo_code
            attachment_body	JSON со снимком таблиц: attachment + mo_info_attach + person_info
  
  - case_id: 97f3ec11-cfba-42bb-9f6f-b263a3dab5d5
    title: Проверка сохранения сведений для отправки сообщения в таблицу attach_event_topic_send
    priority: low
    pre-conditions:
      - action: Отправить сообщение в топик AttachmentExternalEventTopic, operationType = CREATED
        expected_result: В БД есть прикрепление со статусом ≠ A_CREATED. В таблице attach_event_topic_send_log нет closing_attachment_id по этому requestMessageId (или параметр конфигурации для автозакрытия = 0).
    steps:
      - action: Отправить событие FerzlAttachmentCreatedResultEvent с валидным attachId.
        expected_result: |
