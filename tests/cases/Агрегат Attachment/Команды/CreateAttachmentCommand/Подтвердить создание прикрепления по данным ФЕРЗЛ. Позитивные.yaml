  - case_id: c3d4e5f6-7a8b-4c5d-0e1f-2a3b4c5d6e7f
    title: Проверка обрезания полей descr, dsource, dsourceType до 255 символов при сохранении в БД
    description: При получении события FerzlAttachmentCreatedResultEvent значения полей descr, dsource, dsourceType, превышающие длину поля в БД (255 символов), должны обрезаться до 255 символов при обновлении записи в таблице attachment.
    priority: medium
    pre-conditions:
      - action: Отправить сообщение в топик AttachmentExternalEventTopic, operationType = CREATED
        expected_result: В БД есть прикрепление со статусом != A_CREATED
    steps:
      - action: Отправить событие FerzlAttachmentCreatedResultEvent с валидным attachId, в котором поля descr, dsource, dsourceType содержат значения длиной более 255 символов
        expected_result: |-
          Система выполняет обновление сведений прикрепления в таблице attachment.
          Значения полей descr, dsource, dsourceType обрезаются до 255 символов и сохраняются в БД (длина поля в БД — 255 символов).

