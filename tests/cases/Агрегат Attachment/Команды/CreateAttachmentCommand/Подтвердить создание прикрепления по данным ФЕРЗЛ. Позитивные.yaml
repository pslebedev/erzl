  - case_id: 8d6b1c81-f927-49b6-81e6-f49964a85c59
    title: Проверка условий срабатывания автозакрытия и обновления статуса ранее закрытого прикрепления 
    priority: high
    pre-conditions:
      - action: Отправить сообщение в топик AttachmentExternalEventTopic, operationType = CREATED
        expected_result: |
          В БД есть прикрепление со статусом != A_CREATED
          В attach_event_topic_send_log по requestMessageId заполнено поле closing_attachment_id
          В config параметр attachmentRequestCommandTopic.import.closeAttachByCreate = 1
          В таблице attachment статус старого прикрепления = A_CLOSING

    steps:
      - action: Отправить событие FerzlAttachmentCreatedResultEvent
        expected_result: |
         Система вызывает CloseAttachmentCommand для закрытия старого прикрепления.
         У старого прикрепления статус изменён на A_CLOSED
         История закрытия записана в attachment_history

  - case_id: 2dea474d-9a2f-4cd1-b492-d0a5adcefeb6
