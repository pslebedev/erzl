  - case_id: c4c44c3b-ba8c-40c5-85ab-d6cdb2250311
    title: 4. Проверка поиска прикреплений с различными типами прикреплений (data.attachTypeCode)
    description: ''
    priority: medium
    steps:
      - action: |-
          Запустить алгоритм.
          Сформировано событие TimeExpiredAttachmentScheduleFiredEvent согласно параматрам
        expected_result: |
          Система выполняет поиск в таблице attach.attachment по условиям
      - action: Проверить результат выполнения команды GetTimeExpiredAttachmentQuery
        expected_result: |-
          Система возвращает список прикреплений.
          В таблице  attach.time_expired_attach_schedule.attach_count_found + 1

          Все найденные прикрепления имеют attach.attachment.ref_attach_type_code = <attachTypeCode>.
          Прикрепления других типов не включены в результат.
    iterations:
      - iteration_id: '1'
        params:
          - name: attachTypeCode
            value: '2'
      - iteration_id: '2'
        params:
          - name: attachTypeCode
            value: '3'
      - iteration_id: '3'
        params:
          - name: attachTypeCode
            value: '5'
    pre-conditions:
      - action: |-
          В таблице attach.attachment существуют прикрепления с истекшим сроком действия
          для различных типов прикреплений (2, 3, 5).
          В справочнике ref.attach_type существуют записи с code = 2, 3, 5.
          В srv.config установлены параметры:
          timeExpiredAttachmentScheduleFiredAlg.attachTypeCode = <attachTypeCode>
          timeExpiredAttachmentScheduleFiredAlg.expirationPeriod = 365
          timeExpiredAttachmentScheduleFiredAlg.queryMaxCountRows = 100
        expected_result: ''

  - case_id: 7f26d2a5-7e0e-4aea-8220-c389cd3e6a51
    title: 5. Проверка возврата пустого списка при отсутствии истекших прикреплений
    description: ''
    priority: medium
    steps:
      - action: |-
          Запустить алгоритм.
          Сформировано событие TimeExpiredAttachmentScheduleFiredEvent согласно параметрам
        expected_result: 'Система выполняет поиск в таблице attach.attachment по условиям '
      - action: Проверить результат выполнения команды GetTimeExpiredAttachmentQuery
        expected_result: |-
          Система возвращает пустой список прикреплений.

          В таблице  attach.time_expired_attach_schedule.attach_count_found + 0
          Прикреплений, соответствующих условиям поиска, не найдено.
    pre-conditions:
      - action: |-
          В таблице attach.attachment НЕТ прикреплений, соответствующих условиям поиска:
          - Нет прикреплений с is_active = 1 и ref_attach_type_code = 2
          - ИЛИ все прикрепления имеют date_end >= текущая дата
          - ИЛИ все прикрепления имеют attach.attachment.date_begin + data.expirationPeriod - 1 >= текущая дата
          В srv.config установлены параметры:
          timeExpiredAttachmentScheduleFiredAlg.attachTypeCode = 2
          timeExpiredAttachmentScheduleFiredAlg.expirationPeriod = 365
          timeExpiredAttachmentScheduleFiredAlg.queryMaxCountRows = 100
        expected_result: ''
