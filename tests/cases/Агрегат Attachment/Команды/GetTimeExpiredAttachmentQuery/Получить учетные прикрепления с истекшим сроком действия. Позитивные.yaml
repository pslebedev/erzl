suite_id: 0ed8c413-651f-473b-adfc-e37291526ca7
suite_name: Позитивные проверки команды GetTimeExpiredAttachmentQuery
description: Проверка успешных сценариев работы команды поиска учетных прикреплений с истекшим сроком действия
created_at: '2026-01-14T13:03:01Z'
status: new
test_cases:
  - case_id: dab19673-006d-4866-ad0e-abb04cf7a4b2
    title: 1. Проверка поиска единственного прикрепления с истекшим сроком действия (attach.attachment.date_end < data.dateProcess)
    description: ''
    priority: high
    steps:
      - action: |-
          Запустить алгоритм.
          Сформировано событие TimeExpiredAttachmentScheduleFiredEvent согласно параматрам
        expected_result: |-
          Система выполняет поиск в таблице attach.attachment по условиям (через И):
          attach.attachment.is_active = 1
          attach.attachment.ref_attach_type_code = attachTypeCode
          attach.attachment.date_end < dateProcess
          Максимальное количество записей для отбора = maxCountRows
      - action: Проверить результат выполнения команды GetTimeExpiredAttachmentQuery
        expected_result: |+
          Система возвращает список прикреплений.
          В таблице  attach.time_expired_attach_schedule.attach_count_found + 1

          В списке найдено одно прикрепление, соответствующее условиям поиска.
          Прикрепление имеет:
          attach.attachment.is_active = 1
          attach.attachment.ref_attach_type_code = attachTypeCode
          attach.attachment.date_end < data.dateProcess

    pre-conditions:
      - action: |-
          В таблице attach.attachment существует прикрепление:
          attach.attachment.is_active = 1
          attach.attachment.ref_attach_type_code = 2 (существует в справочнике ref.attach_type)
          attach.attachment.date_end = текущая дата минус 5 дней (< data.dateProcess)
          В srv.config установлены параметры:
          timeExpiredAttachmentScheduleFiredAlg.attachTypeCode = 2
          timeExpiredAttachmentScheduleFiredAlg.expirationPeriod = 50
          timeExpiredAttachmentScheduleFiredAlg.queryMaxCountRows = 100
        expected_result: ''

