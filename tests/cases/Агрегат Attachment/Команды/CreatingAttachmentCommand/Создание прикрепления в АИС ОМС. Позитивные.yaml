  - case_id: 4a84876a-81c0-435d-aded-19389ceb73fb
    title: Проверка корректного сохранения в таблицу SRV.ATTACH_EVENT_TOPIC_SEND сведения для отправки
    description: ''
    priority: high
    steps:
      - action: Отправить сообщение в топик AttachmentExternalEventTopic, operationType = CREATED
        expected_result: |
          Система сохраняет в таблицу SRV.ATTACH_EVENT_TOPIC_SEND сведения для отправки:
          INSURED_PERSON_ID = data/attachment/insuredPersonId из сформированного сообщения
          ATTACHMENT_ID = data/attachment/attachId из сформированного сообщения
          CLOSING_ATTACHMENT_ID = ATTACHMENT.ID закрытого прикрепления, если на шаге 3 было закрыто старое прикрепление
          OPERATION_TYPE = operationType из сформированного сообщения
          MESSAGE_ID = messageId из сформированного сообщения
          MESSAGE_TEXT = сформированное сообщение
          STATUS = 0
          SEND_DATE = SYSDATE;
          CREATE_DATE = SYSDATE;
          CHANGE_DATE = SYSDATE
          Поле CLOSING_ATTACHMENT_ID добавлен для того, чтобы впоследствии можно было определить какое прикрепление было закрыто при создании нового 
  - case_id: c94c9653-83d9-4355-9283-5d2aa1f37da9
    title: Проверка сохранения истории изменения прикрепления в таблицу ATTACH.ATTACHMENT_HISTORY
    priority: high
    pre-conditions:
      - action: Отправить сообщение в топик AttachmentExternalEventTopic, operationType = CREATED
        expected_result: В ATTACH.ATTACHMENT существует активное (IS_ACTIVE=1) прикрепление для этого же ЗЛ (INSURED_PERSON_ID) и того же профиля (REF_RATYPE_PROFILE_CODE), но с другим ATTACH_EXT_ID. processClosingEvent.notIncludeAttachType = 0 (тип прикрепления учитывается).
    steps:
      - action: Отправить сообщение  в топик входных событий сервиса прикреплений
        expected_result: В ATTACH.ATTACHMENT_HISTORY добавлена запись с ATTACHMENT_BODY — JSON, содержащим snapshot таблиц (ATTACHMENT, MO_INFO_ATTACH, PERSON_INFO) для нового прикрепления.
