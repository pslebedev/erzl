          В SRV.ATTACH_EVENT_TOPIC_SEND — запись для AttachmentCreatingEvent.
    pre-conditions:
      - action: Отправить сообщение в топик AttachmentExternalEventTopic, operationType = CREATED
        expected_result: В БД есть активное прикрепление ЗЛ с тем же профилем, но другим типом (REF_ATTACH_TYPE_CODE != attachType). В параметрах системы установлено processClosingEvent.notIncludeAttachType = 0
    description: при отсутствии совпадения по профилю (areaType) — ни одно старое прикрепление не должно быть закрыто, даже если есть активные прикрепления у этого лица для других профилей.
