  - case_id: 3523346d-c726-4ff6-9acb-3843ecd248d4
    title: Проверка поиска другого действующего прикрепления ЗЛ к тому же профилю
    description: 'Сценарий: найдено другое действующее прикрепление для того же ЗЛ и профиля → сначала закрывается старое, затем создаётся новое. Параметр processClosingEvent.notIncludeAttachType = 0'
    priority: high
    pre-conditions:
      - action: Отправить сообщение в топик AttachmentExternalEventTopic, operationType = CREATED
        expected_result: В ATTACH.ATTACHMENT существует активное (IS_ACTIVE=1) прикрепление для этого же ЗЛ (INSURED_PERSON_ID) и того же профиля (REF_RATYPE_PROFILE_CODE), но с другим ATTACH_EXT_ID. processClosingEvent.notIncludeAttachType = 0 (тип прикрепления учитывается).
    steps:
      - action: Отправить сообщение в топик AttachmentExternalEventTopic, operationType = CREATED
        expected_result: 'Система формирует событие о необходимости закрытия прикрепления ProcessClosingEvent с параметрами: eventName = ProcessClosingEvent data/attachOmsId = ATTACH.ATTACHMENT.ID прикрепления, найденного на предыдущем шаге data/attachCloseCode = значение системного параметра processClosingEvent.attachCloseCode data/dateAttachEnd = data/attachment/dateAttachBegin из входных параметров Прикрепление успешно закрыто: команда вернула ИД сформированного сообщения.'
