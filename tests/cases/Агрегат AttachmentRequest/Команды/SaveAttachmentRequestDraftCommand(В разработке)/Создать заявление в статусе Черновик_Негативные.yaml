  - case_id: e099eebb-8df3-4d73-9de1-80f44c55e265
    title: AC.6 Проверка формирования ошибки, если инициатору запроса недоступно создание/изменение заявления на прикрепление
    description: Описание
    priority: medium
    steps:
      - action: |
          1) Во входных параметрах передан attachmentId
          2) Вызвать метод SaveAttachmentRequestDraftCommand, передав на вход инициатора, которому недоступно создание/изменение заявления на прикрепление.
          PickupPoint(pickupPointOrganization) = mo
          PickupPoint(cоdeМО) != AttachmentRequestMo (moCodeVsi)
        expected_result: |-
          Получена ошибка 409
          InvalidInitiator Инициатору запросу {0} недоступно изменение заявления на прикрепление к МО {1} .

          {0}: cоdeМО - значение входного параметра

          {1}: moCodeVsi - значение входного параметра
    pre-conditions: []

  - case_id: 175b9e4c-e6be-4e3f-af82-ac853ce4b5b2
    title: AC.6 Проверка формирования ошибки, если инициатору запроса недоступно создание/изменение заявления на прикрепление
    description: Описание
    priority: medium
    steps:
      - action: |-
          1) Во входных параметрах передан attachmentId
          2) Вызвать метод SaveAttachmentRequestDraftCommand, передав на вход инициатора, которому недоступно создание/изменение заявления на прикрепление.

          В созданном ранее Черновике заявления на прикрепление (если выполняется редактирование) 
          PickupPoint(pickupPointOrganization) = mo
          AttachmentRequestMo (moCodeVsi) = attach.attachment.ref_mo_mgfoms_core_code_vsi_mo, где attach.attachment.id = attachmentId (при наличии в БД)
        expected_result: |-
          Получена ошибка 409
          InvalidInitiator Инициатору запросу {0} недоступно изменение заявления на прикрепление к МО {1} .

          {0}: cоdeМО - значение входного параметра

          {1}: moCodeVsi - значение входного параметра
    pre-conditions: []

