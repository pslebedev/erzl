  - case_id: ccd72b69-08c9-4a2b-af56-c9ef8c0a8759
    title: "AC.12 Проверка формирования ошибки, если не пройден алгоритм проверки возможности сохранения заявления на прикрепление\_CheckAttachmentRequestAlg"
    description: Описание
    priority: medium
    steps:
      - action: |
          Вызвать метод SaveAttachmentRequestDraftCommand, передав на вход  
          значение
          !Параметризация

          - возраст застрахованного лица НЕ соответствует возрастной категории МО;
          - возраста застрахованного лица НЕ соответствует типу участка;
          - дата регистрации заявления отклоняется от текущей даты более, чем разрешенный период (разрешенный период определяется системными параметрами);
          - профиль участка НЕ соответствует типу участка по справочнику (АИС ОМС 2.0) Справочник "Типы участков медицинской организации для учёта прикреплений"  (бизнес-код - OmsAreaType);
          - тип финансирования НЕ соответствует типу прикрепления.
        expected_result: |-
          Получена ошибка 409

          InvalidAttachReqAgeMo
          InvalidAttachReqAgeArea
          InvalidDateApplyReg
          InvalidProfileAndAreaType
          InvalidCapitationAndAttachType 

          +  Групповая ошибка АggregatedBusinessException
    pre-conditions: []
    iterations: []

