  - case_id: f78f4984-d6d6-4124-9dcf-ba3870f54920
    title: "АС.2 Проверка формирования ошибки, если найдено\_идентичное неутвержденное заявления на прикрепление"
    description: Описание
    priority: high
    steps:
      - action: |-
          1) Во входных параметрах не передан attachmentId
          2) В БД у ЗЛ есть идентичное прикрепление

          - attach.attachment.insured_person_id = PersonInfo (insuredPersonId) из входных параметров
          - attach.attachment.ref_attach_status_code_request =  "Черновик" (arDraft) или "Заявление создано" (arCreated))
          - attach.attachment.ref_ratype_profile_code = AttachmentRequestContent (profileCode) из входных параметров
          - attach.attachment.ref_attach_type_code = AttachmentRequestContent (attachType) из входных параметров
          - attach.attachment.ref_mo_mgfoms_core_code_vsi_mo = MoInfo(moCodeVsi) из входных параметров
        expected_result: |-
          Сформирована ошибка 409 
          AttachmentRequestDouble Найдено идентичное неутвержденное заявления на прикрепление (id - {0}).

