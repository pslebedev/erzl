  - case_id: 27cbdf4f-0894-4744-a01e-c0bd99bded91
    title: 7.Проверка обновления сведений о заявлении на прикрепление.
    description: Описание
    priority: high
    steps:
      - action: Вызван метод PATH /api/v1/AttachmentRequest/ApproveSmoAttachmentRequestCommand с корректно заполненными параметрами
        expected_result: |-
          Система выполняет обновление сведений о заявлении на прикрепление на основании входных параметров REST метода вызова команды ApproveSmoAttachmentRequestCommand в записи attach.attachment.id = attachmentId (из запроса):
          ref_attach_status_code_request = attachReqStatus
          change_system_code = systemCode
          ref_source_types_code = pickupPointOrganization
          change_source_code = cоdeSМО
          operator_changed = userId
          operator_role = role
          certificate_serial_number = значение входного параметра Operator (role)
          signature_date_time = значение входного параметра Operator (signatureDateTime)
          is_legal_entity = значение входного параметра Operator (isLegalEntity)
          operator_organization = json по значению входного параметра Organization
          operator_job = json по значению входного параметра Job
          operator_user = json по значению входного параметра User
          version = attach.attachment.version+1
          attach_change_date = current_timestamp
          change_date = current_timestamp

