  - case_id: 343ec059-07e3-4905-9594-3b17ab15d44e
    title: "АС10. Проверка формирования ошибки при некорректной дате принятия решения указанной во входном параметре\_ AttachmentRequestApproved\_(dateDoctorDecision)"
    description: Описание
    priority: high
    steps:
      - action: |-
          Вызвать метод /api/v1/AttachmentRequest/ApproveAttachmentRequestCommand с параметром 
          dateDoctorDecision = <value>
        expected_result: 'Система возвращает ответ с кодом 409 и кодом ошибки InvalidDateDoctorDecision Дата принятия решения по заявлению на прикрепление ({0}) не соответствует необходимым условиям: по дате регистрации ({1}) и текущей дате ({2}).'
    iterations:
      - iteration_id: '1'
        params:
          - name: value
            value: dateDoctorDecision < attach.attachment.apply_reg_date (дата принятия решения ранее регистрации заявления на прикрепление (attach.attachment.apply_reg_date), найденного на шаге 2)
      - iteration_id: '2'
        params:
          - name: value
            value: dateDoctorDecision > attach.attachment.apply_reg_date 3 дня (позднее на 3 дня от даты регистрации заявления на прикрепление (attach.attachment.apply_reg_date), найденного на шаге2)
      - iteration_id: '3'
        params:
          - name: value
            value: dateDoctorDecision < текущая дата - 2 дня (ранее, чем 2 дня от текущей даты)
      - iteration_id: '4'
        params:
          - name: value
            value: 'dateDoctorDecision > текущая дата+1 день '

  - case_id: d96ac49a-bbf7-452b-bfc4-3066ff9db556
    title: "AC11.\_Проверка формирования ошибки при некорректной дате\_начала действия прикрепления AttachmentRequestApproved (dateBegin)"
    description: Описание
    priority: high
    steps:
      - action: |-
          Вызвать метод /api/v1/AttachmentRequest/ApproveAttachmentRequestCommand с id прикрепления, у которого
          dataBegin = <value> .
        expected_result: 'Система возвращает ответ с кодом 409 и кодом ошибки InvalidDateBeginAttach Дата начала прикрепления ( {0} ) не соответствует необходимым условиям: по дате принятия решения ({1}) и текущей дате ({2}).'
    iterations:
      - iteration_id: '1'
        params:
          - name: value
            value: dateBegin < AttachmentRequestApproved (dateDoctorDecision) (позднее, чем дата принятия решения главным врачом о прикреплении AttachmentRequestApproved (dateDoctorDecision))
      - iteration_id: '2'
        params:
          - name: value
            value: dateBegin < текущая дата - 2 дня (позднее чем 2 дня от текущей даты)
      - iteration_id: '3'
        params:
          - name: value
            value: dateBegin > текущая дата +30 дней (ранее чем 30 дней от текущей даты)

