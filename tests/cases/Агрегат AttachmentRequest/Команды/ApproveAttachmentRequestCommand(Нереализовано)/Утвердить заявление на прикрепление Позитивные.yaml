  - case_id: 00b122b7-4aea-4b3b-8190-bc36fc79f4df
    title: 1. Проверка корректности заполнения входных параметров в соответствии со схемой
    description: ''
    priority: high
    steps:
      - action: |
          Вызвать метод PATCH /api/v1/AttachmentRequest/ApproveAttachmentRequestCommand с корректно заполненными параметрами:
          attachmentId = ИД заявления на прикрепление
          dateDoctorDecision = Дата решение о прикреплении ЗЛ к МО
          chiefDocApproverId = ИД главного врача МО
          decisionApproved = Сведения решения о прикреплении
          scanInfo = Скан заявления на прикрепление (scanTypeCode = 2)
          externalContext = Контекстная информация
        expected_result: |-
          Система проверяет корректность заполнения входных параметров в соответствии со схемой.
          Все обязательные параметры присутствуют.
          Все параметры соответствуют типу и формату.
          Проверка пройдена успешно.
          Переход на следующий шаг.
    pre-conditions:
      - action: Все входные параметры заполнены корректно и соответствуют схеме запроса
        expected_result: ''

