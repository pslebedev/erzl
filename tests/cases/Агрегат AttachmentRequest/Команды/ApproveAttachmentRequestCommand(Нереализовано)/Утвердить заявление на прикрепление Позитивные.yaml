  - case_id: dab9d9c9-ce49-43a4-9f8b-4c17b8f2bf2b
    title: 12.1. Проверка обновления сведений заявления на прикрепление на основании входных параметров REST метода
    description: ''
    priority: high
    steps:
      - action: |-
          Вызвать метод PATCH /api/v1/AttachmentRequest/ApproveAttachmentRequestCommand
          с корректными параметрами
        expected_result: |-
          Система выполняет обновление сведений о заявлении на прикрепление в таблице attach.attachment:
          - ref_attach_status_code_request = arApproved
          - date_doctor_decision = значение входного параметра AttachmentRequestApproved (dateDoctorDecision)
          - ref_medical_stuff_mo_doctor_id_chief = значение входного параметра AttachmentRequestApproved (chiefDocApproverId)
          - area_num = значение входного параметра AttachDoctorInfo (areaNum)
          - area_frmo_id = значение входного параметра AttachDoctorInfo (areaId)
          - ref_area_mo_area_id = значение входного параметра AttachDoctorInfo (areaFrmoId)
          - ref_medical_stuff_mo_doctor_id = значение входного параметра AttachDoctorInfo (doctorId)
          - doctor_since = значение входного параметра AttachDoctorInfo (doctorSince)
          - ref_frmr_persons_snils = ref.medical_stuff_mo.doctor_snils, где ref.medical_stuff_mo.doctor_id = AttachmentRequestApproved (doctorId)
          - ref_frmr_persons_oid = ref.frmr_persons.oid, где ref.frmr_persons.snils = ref.medical_stuff_mo.doctor_snils
          - date_begin = значение входного параметра DecisionApproved (dateBegin)
          - date_end = значение входного параметра DecisionApproved (dateEnd)
          - change_system_code = значение входного параметра Metadata (systemCode)
          - ref_source_types_code = значение входного параметра PickupPoint (pickupPointOrganization)
          - change_source_code = значение входного параметра PickupPoint (codeМО)
          - operator_changed = значение входного параметра Operator (userId)
          - operator_role = значение входного параметра Operator (role)
          - certificate_serial_number = значение входного параметра Operator (certificateSerialNumber)
          - signature_date_time = значение входного параметра Operator (signatureDateTime)
          - is_legal_entity = значение входного параметра Operator (isLegalEntity)
          - operator_organization = json по значению входного параметра Organization
          - operator_job = json по значению входного параметра Job
          - operator_user = json по значению входного параметра User
          - version = attach.attachment.version + 1
          - attach_change_date = current_timestamp
          - change_date = current_timestamp
          Переход на следующий шаг.
    pre-conditions:
      - action: Все предыдущие проверки пройдены успешно.
        expected_result: ''

