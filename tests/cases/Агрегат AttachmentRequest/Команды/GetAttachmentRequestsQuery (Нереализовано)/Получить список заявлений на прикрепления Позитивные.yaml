  - case_id: 0d6d54b5-6815-4d96-b993-20514f0f1bc4
    title: 3. Проверка поиска заявления на прикрепления по insured_person_id
    description: Описание
    priority: high
    steps:
      - action: |-
          Вызвать метод  POST /api/v1/AttachmentRequest/GetAttachmentRequestsQuery/
          в теле передать валидные зачения
          а так же :
          <value>
        expected_result: 'Переход на шаг4 '
    iterations:
      - iteration_id: '1'
        params:
          - name: value
            value: attach.attachment_request_approved.insured_person_id = insuredPersonId (существующий)
      - iteration_id: '2'
        params:
          - name: value
            value: attach.attachment_request_approved.insured_person_id = insuredPersonId(несуществующий)
      - iteration_id: '3'
        params:
          - name: value
            value: передать attach.attachment_request_approved.date_apply_reg >= dateApplyReg/startDate
      - iteration_id: '4'
        params:
          - name: value
            value: attach.attachment_request_approved.date_apply_reg <= dateApplyReg/endDate
      - iteration_id: '5'
        params:
          - name: value
            value: attach.attachment_request_approved.ref_attach_status_code_request = attachReqStatus

