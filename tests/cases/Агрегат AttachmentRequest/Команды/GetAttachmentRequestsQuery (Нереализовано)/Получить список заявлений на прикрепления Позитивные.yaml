    title: 1. Проверка корректности входных параметров
    description: Описание
    priority: high
    steps:
      - action: |
          Вызвать метод  POST /api/v1/AttachmentRequest/GetAttachmentRequestsQuery/
          в теле передать валидные зачения
          insuredPersonId = ИД персоны в АИС ОМС (обязательный)
          dateApplyReg = Период даты регистрации заявления о прикреплении (не обязательный)
          startDate = Дата начала периода (обязательный)
          endDate = Дата окончания периода (обязательный)
          attachReqStatus = Статус заявления на прикрепление(не обязательный)
          paging = Параметры пагинации (не обязательный, если элемент не указан, то применяются параметры предустановленные по умолчанию:
          page = 0
          pageSize = 10)
        expected_result: Переход на шаг 2
    pre-conditions:
      - action: параметр restQuery.maxPageSize = 10
        expected_result: Результат предусловия

  - case_id: f0bbb67e-67da-44ad-b4ea-32ea5b89f7a8
