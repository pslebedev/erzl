  - case_id: bc0337df-7ba9-4ddc-b7e3-953f2828cad6
    title: 4. Проверка сортировки найденных прикреплений
    description: Описание
    priority: high
    steps:
      - action: |
          Вызвать метод  POST /api/v1/AttachmentRequest/GetAttachmentRequestsQuery/
          в теле передать валидные зачения
          insuredPersonId = ИД персоны в АИС ОМС (обязательный)
          dateApplyReg = Период даты регистрации заявления о прикреплении (не обязательный)
          startDate = Дата начала периода (обязательный)
          endDate = Дата окончания периода (обязательный)
          attachReqStatus = Статус заявления на прикрепление(не обязательный)
          paging = Параметры пагинации (не обязательный, если элемент не указан, то применяются параметры предустановленные по умолчанию:
          page = 0
          pageSize = 10)
        expected_result: |-
          Код профиля прикрепление - в порядке возрастания (по полю attach.attachment_request_approved.ref_ratype_profile_code)
          Дата регистрации заявления на прикрепление - в порядке убывания (по полю attach.attachment_request_approved.date_apply_reg)

          Внутренний идентификатор заявления на прикрепление - в порядке убывания (по полю attach.attachment_request_approved.attachment_id)
          переход на шаг 5

  - case_id: 0498b194-e265-4f5e-ade8-73cfb1b989d9
    title: 5. Проверка формирования тела ответа
    description: Описание
    priority: high
    steps:
      - action: |
          Вызвать метод  POST /api/v1/AttachmentRequest/GetAttachmentRequestsQuery/
          в теле передать валидные зачения
          insuredPersonId = ИД персоны в АИС ОМС (обязательный)
          dateApplyReg = Период даты регистрации заявления о прикреплении (не обязательный)
          startDate = Дата начала периода (обязательный)
          endDate = Дата окончания периода (обязательный)
          attachReqStatus = Статус заявления на прикрепление(не обязательный)
          paging = Параметры пагинации (не обязательный, если элемент не указан, то применяются параметры предустановленные по умолчанию:
          page = 0
          pageSize = 10)
        expected_result: |
          Система возвращает тело ответа и код 200.
          Если какой то необязательный параметр не передавался, то в теле будет null

          pagingResult:
          total = Доступное количество записей
          page = Номер страницы
          pageSize = Количество записей на странице

          В соответсвии сколько записей было найдено
          AttachmentRequestInfo:
          attachmentId = ИД заявления на прикрепление
          insuredAttr = Сведения о застрахованном лице
          representativeAttr = Сведения о законном представителе
          attachmentRequestContent = Сведения о заявлении на прикрепление
          moInfoRequest = Сведения о медицинской организации
          scanInfo = Сведения о скане заявления на прикрепление
          attachmentRequestApproved = Сведения об утверждении или отказе в утверждении заявления на прикрепление
          attachmentRequestDecisionSmo = Сведения о решении СМО по прикреплению ЗЛ при смене места жительства
          decisionSmoSignatures = Блок, содержащий подписываемые данные решении СМО по прикреплению ЗЛ при смене места жительства
          attachReqStatus = Код статуса прикрепления
          attachReqStatusName = Наименование статуса прикрепления
          version = Версия заявления
          attachmentRequestChangeDate = Дата, время изменения заявления на прикрепление 
          attachmentRequestSignatures = Блок, содержащий подписываемые данные заявления и информацию об электронной подписи

