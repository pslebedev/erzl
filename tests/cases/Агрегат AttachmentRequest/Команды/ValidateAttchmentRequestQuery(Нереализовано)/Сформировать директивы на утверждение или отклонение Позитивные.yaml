  - case_id: 567fb22b-f1b6-43ea-a816-bd67f991d206
    title: "4. и 4.1 Проверка на возможность утверждения прикрепления из шага 3.3 и вызов алгоритма\_ GetPersonSimilarAttachmentRequests"
    description: Описание
    priority: medium
    steps:
      - action: |
          Шаг 3.3 успешно проверен.
          Система Вызывает алгоритм  GetPersonSimilarAttachmentRequests - Алгоритм получения аналогичных заявлений на прикрепление передавая на вход:
          attachmentId (ИД текущего заявления на прикрепление) = attachment.id (из входных параметров);
          insuredPersonId (ИД ЗЛ в АИС ОМС) = insuredPersonId из заявления, найденного на шаге1;
          attachReqStatus = arCreated
          profileCode (Профиль прикрепления)= profileCode из заявления, найденного на шаге1;
          attachTypeCode (Тип прикрепления) = byHeads (подушевое прикрепление)
        expected_result: |
          На выходе получаем список объектов прикрепления пользователя:
          attachmentId - ИД заявления на прикрепление;
          dateApplyReg - Дата подачи заявления;
          attachOpen - Причина прикрепления по заявлению;
          attachTypeCode - Тип прикрепления;
          profileCode - Профиль прикрепления.

          Заявления на прикрепления профиля не найдено, предоставлена директива "разрешить/одобрить". 
          Устновлено на вход значения.
          approveDirectiveResult = true
          rejectDirectiveResult = false
          explanations = null

          Переход на шаг 7.
          Система возвращает ответ с кодом 200  и тело ответа.
          Алгоритм завершен

