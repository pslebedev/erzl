  - case_id: 6ca7a00d-7551-47c8-9b3b-01ba500e509e
    title: 3.3 Проверка начала действия прикрепления для смены прикрепления
    description: Описание
    priority: medium
    steps:
      - action: |-
          Вызвать метод POST /api/v1/AttachmentRequest/ValidateAttachmentRequestQuery
          с валидным attachmentId из предусловия, а так же  attach.attachment.ref_attach_open_code = hospitalChangee
        expected_result: |-
          Дата начала прикрепления (dateBegin) для любого элемента списка типа PersonSimilarAttachmentsData < Текущая дата минус значение системного параметра attachmentRequestValidation.minChangePeriod  (Минимальный период, после которого можно сменить прикрепление с причиной не равной "Смена места жительства", в календарных днях).
          Условие выполнено - переход на шаг 4.
    pre-conditions:
      - action: |-
          Системный параметр attachmentRequestValidation.minChangePeriod установлен в значение 365

          На шаге 3.2 передано прикрепление с dateBegin = 13.02.2026

          Текущая дата 14.02.2026
        expected_result: Результат предусловия

