  - case_id: 10efde98-cdb4-4ae2-8358-4ed67fd84608
    title: AC.3 Проверка формирования ошибки, если статус заявления на прикрепление не позволяет выполнить действие
    description: Описание
    priority: medium
    steps:
      - action: |+
          Вызвать метод SaveAttachmentRequestCommand, передав на вход attachmentId, имеющий статус в БД

          <param>

        expected_result: |-
          Получена ошибка 409
          AttachmentRequestExpired
          Нарушен срок работы с заявлением, необходимо зарегистрировать новое
    pre-conditions:
      - action: Во входных параметрах передан attachmentId, существующий в БД
        expected_result: Результат предусловия
    iterations:
      - iteration_id: '1'
        params:
          - name: param
            value: attach.attachment.ref_attach_status_code_request <> arExpired
      - iteration_id: '2'
        params:
          - name: param
            value: attach.attachment.ref_attach_status_code_request <> arExpiredDoc

