  - case_id: 90976ccf-0a3f-45f4-905d-5bafb4147c5e
    title: АС.11 Проверка формирования ошибки при  некорректном значении параметра достоверности информации
    description: Описание
    priority: medium
    steps:
      - action: Действие
        expected_result: Ожидаемый результат
    iterations:
      - iteration_id: '1'
        params:
          - name: param
            value: ''
      - iteration_id: '2'
        params:
          - name: param
            value: PersonInfo.dost = 456__Содержит все три значения из {4, 5, 6}
      - iteration_id: '3'
        params:
          - name: param
            value: PersonInfo.dost = 445__Содержит два значения из {4, 5, 6}
      - iteration_id: '4'
        params:
          - name: param
            value: PersonInfo.dost = 123__Содержит три значения из {1, 2, 3}
      - iteration_id: '5'
        params:
          - name: param
            value: PersonInfo.dost = 112__Содержит три значения из {1, 2, 3}
      - iteration_id: '6'
        params:
          - name: param
            value: PersonInfo.dost = 4? __Не содержит значений из {1, 2, 3}
      - iteration_id: '7'
        params:
          - name: param
            value: PersonInfo.dost =1234 __Нарушает оба правила
      - iteration_id: '8'
        params:
          - name: param
            value: PersonInfo.dost =234 __Содержит запрещенную комбинацию 23 и значение 4
      - iteration_id: '9'
        params:
          - name: param
            value: PersonInfo.dost =7 __Содержит недопустимое число 7
      - iteration_id: '10'
        params:
          - name: param
            value: PersonInfo.dost =Null __Пустая строка
      - iteration_id: '11'
        params:
          - name: param
            value: PersonInfo.dost =1a2__Содержит недопустимые символы

  - case_id: ccd72b69-08c9-4a2b-af56-c9ef8c0a8756
    title: "AC.12 Проверка формирования ошибки, если не пройден алгоритм проверки возможности сохранения заявления на прикрепление\_CheckAllowSaveAttachmentRequestAlg"
    description: Описание
    priority: medium
    steps:
      - action: |
          Вызвать метод SaveAttachmentRequestCommand, передав на вход  
          значение
          !Параметризация

          - возраст застрахованного лица НЕ соответствует возрастной категории МО;
          - возраста застрахованного лица НЕ соответствует типу участка;
          - дата регистрации заявления отклоняется от текущей даты более, чем разрешенный период (разрешенный период определяется системными параметрами);
          - профиль участка НЕ соответствует типу участка по справочнику (АИС ОМС 2.0) Справочник "Типы участков медицинской организации для учёта прикреплений"  (бизнес-код - OmsAreaType);
          - тип финансирования НЕ соответствует типу прикрепления.
        expected_result: |-
          Получена ошибка 409
          Расписать параметризацию по ошибкам +  групповая ошибка АggregatedBusinessException
    pre-conditions: []
    iterations: []

  - case_id: 41d16476-295d-451a-a6a3-54293376b779
    title: АС.13 Проверка формирования ошибки, если переданы некорректные данные о действующем прикреплении персоны
    description: Описание
    priority: medium
    steps:
      - action: <param>
        expected_result: |
          Сформирована ошибка
          409
          InvalidAttachmentLastActiveId
          Некорректные данные о действующем прикреплении персоны на дату регистрации заявления на прикрепление (attachmentLastActiveId = {0})
    iterations:
      - iteration_id: '1'
        params:
          - name: param
            value: В БД нет attach.attachment.id = AttachmentRequest (attachmentLastActiveId)
      - iteration_id: '2'
        params:
          - name: param
            value: Передано AttachmentRequestContent (profileCode) != attach.attachment.ref_ratype_profile_code, где attach.attachment.id = AttachmentRequest (attachmentLastActiveId)
      - iteration_id: '3'
        params:
          - name: param
            value: attach.attachment.is_active = false, где attach.attachment.id = AttachmentRequest (attachmentLastActiveId)
      - iteration_id: '4'
        params:
          - name: param
            value: AttachmentRequestContent (profileCode) != attach.attachment.ref_ratype_profile_code  и attach.attachment.is_active = false

