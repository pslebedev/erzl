  - case_id: 59196b5d-f799-4f1f-82dc-860fe3d2bed7
    title: 1-6 Проверка система на корректность заполнения входных параметров
    description: Описание
    priority: high
    steps:
      - action: "Вызвать метод PATCH /api/v1/AttachmentRequest/RejectSmoAttachmentRequestCommand с корректно заполненными параметрами:\nattachmentId = ИД заявления на прикрепление\ninsuredAttr = Информация о ЗЛ (застрахованном лице)\nrepresentativeAttr = Информация о представителе ЗЛ\nattachmentRequestContent = Атрибуты заявления на прикрепление\nmoInfoRequest = Сведения о МО в заявлении на прикреплении\nattachDoctorInfo = Сведения о прикреплении к врачу\nscanInfo = Сведения о скане заявления на прикрепление\nattachmentRequestApproved = Атрибуты решения об утверждении или отказе заявления на прикрепление\nattachReqStatus = Статус заявления на прикрепление (arApproved)\nversion = Версия заявления\nattachmentRequestChangeDate = \t\nДата, время изменения заявления на прикрепление \nexternalContext = Контекстная информация"
        expected_result: Проверка прошла успешна, переход к 7 шагу

  - case_id: c58660cf-e3e2-4422-bde8-c3b8368537b7
    title: 7.Проверка обновления сведений о заявлении на прикрепление.
    description: Описание
    priority: high
    steps:
      - action: Вызван метод PATH /api/v1/AttachmentRequest/RejectSmoAttachmentRequestCommand с корректно заполненными параметрами
        expected_result: |-
          Система выполняет обновление сведений о заявлении на прикрепление на основании входных параметров REST метода вызова команды ApproveSmoAttachmentRequestCommand в записи attach.attachment.id = attachmentId (из запроса):
          ref_attach_status_code_request = attachReqStatus
          change_system_code = systemCode
          ref_source_types_code = pickupPointOrganization
          change_source_code = cоdeSМО
          operator_changed = userId
          operator_role = role
          certificate_serial_number = значение входного параметра Operator (role)
          signature_date_time = значение входного параметра Operator (signatureDateTime)
          is_legal_entity = значение входного параметра Operator (isLegalEntity)
          operator_organization = json по значению входного параметра Organization
          operator_job = json по значению входного параметра Job
          operator_user = json по значению входного параметра User
          version = attach.attachment.version+1
          attach_change_date = current_timestamp
          change_date = current_timestamp     

  - case_id: 7c42e6b0-b76c-4135-90d0-80d7c78ba5c7
    title: 8. Проверка предварительного сохранения истории изменения на заявления прикрепления
    description: Описание
    priority: high
    steps:
      - action: Вызван метод PATCH /api/v1/AttachmentRequest/RejectSmoAttachmentRequestCommand с корректно заполненными параметрами
        expected_result: |-
          Система запускает SaveAttachmentRequestHistoryAlg - Алгоритм создания записи в истории. В алгоритм передаются следующие параметры:
          attachmentId = ИД из входных параметров (attachmentId)
          changeComand = ApproveSmoAttachmentRequestCommand
          changeEvent = URLИ 
          И сохраняет изменения в таблицу attach.attachment_history.

  - case_id: 5b41e924-b1f8-42fa-9b86-15ae09b0d989
    title: "9. Проверка предварительного формирования сообщения для события\_ AttachmentRequestSmoRejectedEvent"
    description: Описание
    priority: high
    steps:
      - action: Вызван метод PATCH /api/v1/AttachmentRequest/RejectSmoAttachmentRequestCommand с корректно заполненными параметрами
        expected_result: |-
          Система запускает алгоритм  AttachmentRequestSmoRejectedEvent - Получен отказ от СМО. 

          При формировании сообщения передаются следующие параметры
          eventName = AttachmentRequestSmoRejectedEvent
          operationType = 'smoRejected'
          attachmentId = ИД изменяемого заявления на прикрепление, найденного на шаге 2. 
          И Сохраняет изменения в таблицу attachment_request_approved:

