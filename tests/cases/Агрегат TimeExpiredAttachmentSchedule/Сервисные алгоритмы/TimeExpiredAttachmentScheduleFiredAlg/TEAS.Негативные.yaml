suite_name: Негативные проверки алгоритма запуска процесса поиска и закрытия истекших прикреплений
created_at: '2025-12-12T05:17:16Z'
status: new
created_by: Izam Agabalaev
test_cases:
  - case_id: 2eb69f8d-dd6d-49e3-9a0b-a951ff740d2a
    title: 1.1 Проверка не запуска алгоритма при timeExpiredAttachmentScheduleFiredAlg.run.mode = 0
    description: Проверка, что процесс не запускается при выключенном режиме работы
    priority: high
    steps:
      - action: Запустить проверку условий запуска процесса поиска истекших прикреплений.
        expected_result: |-
          Процесс НЕ запускается.
          Запись в таблице svr.run_control НЕ создаётся или НЕ обновляется.
    pre-conditions:
      - action: |-
          В srv.config установлены параметры:
          timeExpiredAttachmentScheduleFiredAlg.run.mode = 0 (выключен)
          timeExpiredAttachmentScheduleFiredAlg.run.beginTime = 00:01:00
          timeExpiredAttachmentScheduleFiredAlg.run.endTime = 23:59:00
          Текущее время находится в диапазоне timeExpiredAttachmentScheduleFiredAlg.run.beginTime - timeExpiredAttachmentScheduleFiredAlg.run.endTime.
          Таблица svr.run_control пустая для code='TEAS'.
        expected_result: ''

  - case_id: 3a1c2d4e-5f6a-4b8c-9d0e-1f2a3b4c5d6e
