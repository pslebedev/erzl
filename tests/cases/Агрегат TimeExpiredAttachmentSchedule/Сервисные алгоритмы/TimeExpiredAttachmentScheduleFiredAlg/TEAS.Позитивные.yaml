  - case_id: c9a0b1c2-d3e4-4f5a-81b6-7d8e9f0a1b2c
    title: 3.2.2.1 Проверка создания новой записи в attach.time_expired_attach_schedule при отсутствии записей.
    description: ''
    priority: medium
    steps:
      - action: |
          Запустить алгоритм
        expected_result: |
          Система выполняет поиск записей по условиям:
          date_process = текущей дате
          status in (0, 1, 2)
      - action: Проверить создание новой записи в таблице attach.time_expired_attach_schedule
        expected_result: |-
          Система создаёт новую запись:
          id = Авто
          date_process = текущая дата
          date_start = current_timestamp
          status = 1 (Статус процесса поиска и закрытия истекших прикреплений - в работе)
          attach_count_found = 0
          attach_count_close = 0
          attach_count_error = 0
          create_date = current_timestamp
          change_date = current_timestamp
    pre-conditions:
      - action: |
          Шаг 3.1 выполнен.
          В таблице attach.time_expired_attach_schedule:
          - Нет записей с date_process = текущая дата и status = 0 (новый)
          - Нет записей с date_process = текущая дата и status in (1, 2)
        expected_result: ''

  - case_id: e1f2a3b4-c5d6-4e7f-8a9b-0c1d2e3f4a5b
    title: 3.2.2.2 Проверка перехода к завершению работы при наличии записи со status = 2 в attach.time_expired_attach_schedule
    description: ''
    priority: medium
    steps:
      - action: |
          Запустить алгоритм.
        expected_result: |-
          Сценарий 2 выполнен успешно.
          Сценарий 3.1 выполнен (зависших записей не найдено или они сброшены).
      - action: Проверить результат поиска записи со status = 0
        expected_result: |
          Запись со status = 0 не найдена.
      - action: Проверить результат поиска записи со status = 2
        expected_result: |
          Найдена запись со status = 2 (выполнен успешно).
          Процесс уже выполнялся и был выполнен успешно.
    pre-conditions:
      - action: |-
          Сценарий 2 выполнен успешно.
          Сценарий 3.1 выполнен (зависших записей не найдено или они сброшены).
          В таблице attach.time_expired_attach_schedule:
          - Нет записей с date_process = текущая дата и status = 0 (новый)
          - Есть запись с date_process = текущая дата и status = 2 (выполнен успешно)
        expected_result: ''

  - case_id: f2a3b4c5-d6e7-4f8a-9b0c-1d2e3f4a5b6c
    title: 4. Проверка заполнения обязательных полей для выполнения команды параметров GetTimeExpiredAttachmentQuery
    description: ''
    priority: medium
    steps:
      - action: |-
          Создать/изменить данные в базе данных:
          <value>
        expected_result: Успешно созданы.
      - action: |-
          Запустить алгоритм.
          Проверить выполнение проверки заполнения обязательных параметров
          с использованием данных, созданных/измененных в базе данных согласно итерации
        expected_result: |-
          Алгоритм корректно работает с созданными/измененными данными
          и продолжает выполнение сценария
    iterations:
      - iteration_id: '1'
        params:
          - name: value
            value: |-
              Создана запись в справочнике ref.attach_type со своим кодом:
              code = 5
              (другие обязательные поля заполнены согласно структуре таблицы)
              В справочнике ref.attach_close существует запись:
              code = 1
              В srv.config установлены параметры:
              timeExpiredAttachmentScheduleFiredAlg.attachTypeCode = 5
              timeExpiredAttachmentScheduleFiredAlg.expirationPeriod = 120
              timeExpiredAttachmentScheduleFiredAlg.attachCloseCode = 1
      - iteration_id: '2'
        params:
          - name: value
            value: |-
              В справочнике ref.attach_type существует запись:
              code = 2
              В справочнике ref.attach_close существует запись:
              code = 1
              В srv.config изменен параметр:
              timeExpiredAttachmentScheduleFiredAlg.expirationPeriod = 365
              (остальные параметры установлены как в итерации 1)
      - iteration_id: '3'
        params:
          - name: value
            value: |-
              В справочнике ref.attach_type существует запись:
              code = 2
              Создана запись в справочнике ref.attach_close со своим кодом:
              code = 2
              (другие обязательные поля заполнены согласно структуре таблицы)
              В srv.config установлен параметр:
              timeExpiredAttachmentScheduleFiredAlg.attachCloseCode = 2
              (остальные параметры установлены как в итерации 1)
    pre-conditions:
      - action: |-
          Сценарий 2 выполнен успешно.
          Сценарий 3 выполнен успешно (запись в attach.time_expired_attach_schedule создана/обновлена со status = 1).
        expected_result: ''

  - case_id: a3b4c5d6-e7f8-4a9b-8c0d-1e2f3a4b5c6d
    title: 5.1. Проверка поиска истекших прикреплений с найденными результатами
    description: ''
    priority: medium
    steps:
      - action: |-
          Проверить формирование события TimeExpiredAttachmentScheduleFiredEvent
          для вызова GetTimeExpiredAttachmentQuery
        expected_result: |-
          Система формирует событие TimeExpiredAttachmentScheduleFiredEvent с параметрами:
          eventName = TimeExpiredAttachmentScheduleFiredEvent
          attachTypeCode = значение системного параметра (Тип прикрепления для поиска)
          timeExpiredAttachmentScheduleFiredAlg.attachTypeCode

          dateProcess = текущая дата
          expirationPeriod = значение параметра timeExpiredAttachmentScheduleFiredAlg.expirationPeriod
          maxCountRows = значение параметра timeExpiredAttachmentScheduleFiredAlg.queryMaxCountRows или 100 (если параметр не заполнен или значение не соответствует типу integer)
      - action: |-
          Проверить результат выполнения GetTimeExpiredAttachmentQuery
          и обновление записей в таблице attach.time_expired_attach_schedule
        expected_result: |
          В таблице attach.time_expired_attach_schedule обновлена запись:
          attach_count_found = attach.time_expired_attach_schedule.attach_count_found + количество записей найденных в запросе.
          change_date = current_timestamp
      - action: Проверить обновление записи даты и времени в svr.run_control.
        expected_result: |-
          В таблице svr.run_control обновлена запись:
          svr.run_control.code = 'TEAS'
          svr.run_control.is_running = 1
          svr.run_control.last_date = current_timestamp
    pre-conditions:
      - action: |-
          Сценарий 4 выполнен успешно.
          В таблице attach.attachment существуют прикрепления с истекшим сроком действия.
          В srv.config установлен параметр:
          timeExpiredAttachmentScheduleFiredAlg.queryMaxCountRows = значение (или не заполнен)
        expected_result: ''

  - case_id: b4c5d6e7-f8a9-4b0c-9d1e-2f3a4b5c6d7e
    title: 5.2. Проверка завершения работы при отсутствии истекших прикреплений
    description: ''
    priority: medium
    steps:
      - action: |-
          Запустить алгоритм.
          Проверить формирование события TimeExpiredAttachmentScheduleFiredEvent
          для вызова GetTimeExpiredAttachmentQuery
        expected_result: |-
          Система формирует событие TimeExpiredAttachmentScheduleFiredEvent с параметрами:
          eventName = TimeExpiredAttachmentScheduleFiredEvent
          attachTypeCode = значение системного параметра timeExpiredAttachmentScheduleFiredAlg.attachTypeCode
          dateProcess = текущая дата
          expirationPeriod = значение параметра timeExpiredAttachmentScheduleFiredAlg.expirationPeriod
          maxCountRows = значение параметра timeExpiredAttachmentScheduleFiredAlg.queryMaxCountRows или 100
      - action: |-
          Проверить результат выполнения GetTimeExpiredAttachmentQuery
          при отсутствии истекших прикреплений
        expected_result: |-
          Система формирует событие TimeExpiredAttachmentScheduleFiredEvent с параметрами:
          eventName = TimeExpiredAttachmentScheduleFiredEvent
          attachTypeCode = значение системного параметра timeExpiredAttachmentScheduleFiredAlg.attachTypeCode
          dateProcess = текущая дата
          expirationPeriod = значение параметра timeExpiredAttachmentScheduleFiredAlg.expirationPeriod
          maxCountRows = значение параметра timeExpiredAttachmentScheduleFiredAlg.queryMaxCountRows
      - action: Проверить переход к завершению работы
        expected_result: |-
          Система переходит к завершению работы (шаг 7).
          Обработка прикреплений НЕ выполняется.
    pre-conditions:
      - action: |-
          Сценарий 4 выполнен успешно.
          В таблице attach.attachment НЕТ прикреплений с истекшим сроком действия.
        expected_result: ''

  - case_id: c5d6e7f8-a9b0-4c1d-9e2f-3a4b5c6d7e8f
    title: 5.3. Проверка передачи значения maxCountRows = 100 при невалидном параметре timeExpiredAttachmentScheduleFiredAlg.queryMaxCountRows
    description: ''
    priority: medium
    steps:
      - action: |
          Запустить алгоритм.
        expected_result: Сценарий 4 выполнен успешно (проверка обязательных параметров пройдена).
      - action: |-
          Проверить формирование события TimeExpiredAttachmentScheduleFiredEvent
          с параметром maxCountRows при невалидном значении timeExpiredAttachmentScheduleFiredAlg.queryMaxCountRows.
        expected_result: |-
          Система формирует событие TimeExpiredAttachmentScheduleFiredEvent с параметрами:
          eventName = TimeExpiredAttachmentScheduleFiredEvent
          attachTypeCode = значение системного параметра (Тип прикрепления для поиска)
          timeExpiredAttachmentScheduleFiredAlg.attachTypeCode
          dateProcess = текущая дата
          expirationPeriod = значение параметра timeExpiredAttachmentScheduleFiredAlg.expirationPeriod
          maxCountRows = 100
          (параметр timeExpiredAttachmentScheduleFiredAlg.queryMaxCountRows <value>)
    iterations:
      - iteration_id: '1'
        params:
          - name: value
            value: не заполнен (параметр отсутствует в srv.config)
