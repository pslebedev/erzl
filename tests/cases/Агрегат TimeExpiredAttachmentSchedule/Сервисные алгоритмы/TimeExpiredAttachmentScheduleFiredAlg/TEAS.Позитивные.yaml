suite_id: 58aa9d37-7fb1-4aa6-821c-645b41906705
suite_name: Позитивные проверки алгоритма поиска и закрытия истекших прикреплений
created_at: '2025-12-11T16:44:34Z'
status: new
created_by: Izam Agabalaev
test_cases:
  - case_id: b2929f76-fa6d-4bfe-b3f6-1662c24d4d9c
    title: 1. Проверка возможности запуска алгоритма при изменении значений параметров
    description: ''
    priority: high
    steps:
      - action: |-
          Установить значение параметра <param> = <value>.
          Запустить проверку условий запуска процесса поиска истекших прикреплений.
        expected_result: |
          Алгоритм запущен успешно.
          Появилась новая запись или обновилась в svr.run_control
    iterations:
      - iteration_id: '1'
        params:
          - name: param
            value: timeExpiredAttachmentScheduleFiredAlg.run.mode
          - name: value
            value: 1 (Режим работы включен)
      - iteration_id: '2'
        params:
          - name: param
            value: timeExpiredAttachmentScheduleFiredAlg.run.beginTime
          - name: value
            value: Текущее время (10:00:00) > timeExpiredAttachmentScheduleFiredAlg.run.beginTime (8:00:00)
      - iteration_id: '3'
        params:
          - name: param
            value: timeExpiredAttachmentScheduleFiredAlg.run.beginTime
          - name: value
            value: 'Текущее время (08:00:00) = timeExpiredAttachmentScheduleFiredAlg.run.beginTime (08:00:00) '
      - iteration_id: '4'
        params:
          - name: param
            value: timeExpiredAttachmentScheduleFiredAlg.run.endTime
          - name: value
            value: Текущее время (17:00:00) < timeExpiredAttachmentScheduleFiredAlg.run.endTime (20:00:00)
      - iteration_id: '5'
        params:
          - name: param
            value: timeExpiredAttachmentScheduleFiredAlg.run.endTime
          - name: value
            value: 'Текущее время (20:00:00) = timeExpiredAttachmentScheduleFiredAlg.run.endTime (20:00:00) '
      - iteration_id: '6'
        params:
          - name: param
            value: timeExpiredAttachmentScheduleFiredAlg.run.startInterval
          - name: value
            value: |-
              В svr.run_control есть запись с code='TEAS' и start_date не пусто.
              current_timestamp - svr.run_control.start_date (20 часов) >= timeExpiredAttachmentScheduleFiredAlg.run.startInterval (18 часов)
      - iteration_id: '7'
        params:
          - name: param
            value: timeExpiredAttachmentScheduleFiredAlg.run.startInterval
          - name: value
            value: В svr.run_control нет записи с code='TEAS' (первый запуск).Условие интервала считается выполненным.
      - iteration_id: '8'
        params:
          - name: param
            value: timeExpiredAttachmentScheduleFiredAlg.run.resetPeriod
          - name: value
            value: В svr.run_control нет записи, где выполняются условия (через И):is_running = 1И last_date >= current_timestamp - timeExpiredAttachmentScheduleFiredAlg.run.resetPeriod (30 минут)И code = 'TEAS'
    pre-conditions:
      - action: |-
          В srv.config установлены базовые параметры:
          timeExpiredAttachmentScheduleFiredAlg.run.mode = 1
          timeExpiredAttachmentScheduleFiredAlg.run.beginTime = 00:01:00
          timeExpiredAttachmentScheduleFiredAlg.run.endTime = 23:59:00
          timeExpiredAttachmentScheduleFiredAlg.run.startInterval = 18
          timeExpiredAttachmentScheduleFiredAlg.run.resetPeriod = 30
          timeExpiredAttachmentScheduleFiredAlg.run.controlTimeInterval = значение для частоты проверки
          Текущее время находится в рабочем диапазоне.
        expected_result: ''

  - case_id: f6d7e8f9-a0b1-4c2d-be3f-4a5b6c7d8e9f
    title: 2.1. Создание новой записи в svr.run_control (первый запуск)
    description: ''
    priority: medium
    steps:
      - action: Запустить алгоритм
        expected_result: |-
          Система создаёт новую запись в таблице svr.run_control
          svr.run_control.code = 'TEAS' (процесс поиска истекших прикреплений)
          svr.run_control.host = хост, запустивший команду
          svr.run_control.start_date = current_timestamp
          svr.run_control.end_date = null
          svr.run_control.is_running = 1 (статус запуска процесса - запущен)
          svr.run_control.last_date = current_timestamp
    pre-conditions:
      - action: |-
          Условия из сценария 1 соблюдены
          В таблице svr.run_control нет записи с code = 'TEAS'
        expected_result: ''

  - case_id: d4b5c6d7-e8f9-4a0b-9c1d-2e3f4a5b6c7d
    title: 2.2. Обновление существующей записи в svr.run_control (is_running = 0)
    description: ''
    priority: medium
    steps:
      - action: Запустить алгоритм.
        expected_result: |-
          Система обновляет существующую запись в таблице svr.run_control:
          svr.run_control.start_date = current_timestamp
          svr.run_control.end_date = null
          svr.run_control.is_running = 1 (статус запуска процесса - запущен)
          svr.run_control.host = хост, запустивший команду
          svr.run_control.last_date = current_timestamp
    pre-conditions:
      - action: |-
          Условия из сценария 1 соблюдены
          В svr.run_control существует запись:
          code = 'TEAS'
          is_running = 0
          start_date не пусто
        expected_result: ''

  - case_id: e5c6d7e8-f9a0-4b1c-ad2e-3f4a5b6c7d8e
    title: 2.2. Обновление зависшей записи в svr.run_control (is_running = 1, процесс завис)
    description: ''
    priority: medium
    steps:
      - action: Запустить алгоритм
        expected_result: |
          Система выполняет поиск записи в svr.run_control по условиям:
          code = 'TEAS'
          is_running = 1 (процесс запущен)
          last_date < current_timestamp - timeExpiredAttachmentScheduleFiredAlg.run.resetPeriod
          (процесс завис)
      - action: Проверить результат фиксации начала работы в таблице svr.run_control
        expected_result: |-
          Система обновляет существующую запись (зависший процесс):
          svr.run_control.start_date = current_timestamp
          svr.run_control.end_date = null
          svr.run_control.is_running = 1 (статус запуска процесса - запущен)
          svr.run_control.host = хост, запустивший команду (новый хост)
          svr.run_control.last_date = current_timestamp
    pre-conditions:
      - action: |-
          Условия из сценария 1 соблюдены
          В svr.run_control существует запись:
          code = 'TEAS'
          is_running = 1
          last_date < current_timestamp - timeExpiredAttachmentScheduleFiredAlg.run.resetPeriod
        expected_result: ''

  - case_id: a7e8f9a0-b1c2-4d3e-8f4a-5b6c7d8e9f0a
    title: 3.1. Проверка сброса зависшей записи в attach.time_expired_attach_schedule
    description: ''
    priority: medium
    steps:
      - action: Выполнить запуск алгоритма
        expected_result: |
          Система сбрасывает зависшую запись:
          attach.time_expired_attach_schedule.date_end = current_timestamp
          attach.time_expired_attach_schedule.change_date = current_timestamp
          attach.time_expired_attach_schedule.error = "Обработка зависла" формируется ошибка с кодом AT_TEAS_003
          attach.time_expired_attach_schedule.status = 3
      - action: Проверить сброс зависшей записи в таблице attach.time_expired_attach_schedule
        expected_result: |-
          Система сбрасывает зависшую запись:
          attach.time_expired_attach_schedule.date_end = current_timestamp
          attach.time_expired_attach_schedule.change_date = current_timestamp
          attach.time_expired_attach_schedule.error = "Обработка зависла" формируется ошибка с кодом AT_TEAS_003
          attach.time_expired_attach_schedule.status = 3

          сценарий продолжает работу
    pre-conditions:
      - action: |-
          Сценрий 2 выполнен успешно.
          В таблице attach.time_expired_attach_schedule существует запись:
          date_process = текущая дата
          status = 1 (в работе) (зависшая)
          С момента последнего изменения прошло больше времени, чем указано в timeExpiredAttachmentScheduleFiredAlg.run.resetPeriod.
        expected_result: ''

