        params:
          - name: value
            value: не соответствует типу integer (например, значение = 'abc' или '12.5')
    pre-conditions:
      - action: |-
          Сценарий 4 выполнен успешно.
          В таблице attach.attachment существуют прикрепления с истекшим сроком действия.
          В srv.config параметр timeExpiredAttachmentScheduleFiredAlg.queryMaxCountRows =  <value>
        expected_result: ''

