  - case_id: 643461f8-e1c7-40f4-8de8-34eb3fdbc568
    title: "6.1-4 Проверка закрытия\_прикрепление ЗЛ, достигшего совершеннолетия, к детской МО"
    description: Описание
    priority: high
    steps:
      - action: |-
          Сформировано событие TeenagerAttachmentClosingEvent - Найдено прикрепление ЗЛ, достигшего совершеннолетия, к детскому участку, которое необходимо закрыть с параметрами

          1) eventName = TeenagerAttachmentClosingEvent
          2) attachId = attachment.id
          3) attachСloseСode = значение сис. параметра teenagerAttachmentScheduleFired.attachСloseСode
          4) если <param1>, то <param2>
        expected_result: |
          Система:
          1) Инициирует закрытие прикрепления InsideClosingAttachmentCommand 
          2) Сохраняет результат обработки в srv.teenager_attach_change_log
          3) Обновляет запись в attach.teenager_time_expired_attach_schedule
          attach_count_close = attach_count_close + 1
          change_date = current_timestamp
          4) Обновляет запись в srv.run_control, где svr.run_control.code = 'TASF' и svr.run_control.is_running = 1.
    pre-conditions:
      - action: |-
          Прикрепление имеет детскую возрастную категорию МО (ref.mo_mgfoms_core) 
          moAgeСategory = ref.mo_mgfoms_core.age_category, где ref.mo_mgfoms_core.code_vsi = attach.attachment.ref_mo_mgfoms_core_code_vsi_mo
        expected_result: '-'
    iterations:
      - iteration_id: '1'
        params:
          - name: param1
            value: teenagerAttachmentScheduleFired.closeOnCurrentDate=1
          - name: param2
            value: dateEnd = текущая дата
      - iteration_id: '2'
        params:
          - name: param1
            value: teenagerAttachmentScheduleFired.closeOnCurrentDate=0
          - name: param2
            value: dateEnd = attach.person_info.birth_date + "количество лет" в srv.teenager_area_type_change.years_count (где srv.teenager_area_type_change.ref_ratype_code_teenager = attach.attachment.ref_ratype_code)  + "количество дней" в значении параметра "Период действия прикрепления после совершеннолетия" (teenagerAttachmentScheduleFired.periodAfterBirthday) минус 1 день.
      - iteration_id: '3'
        params:
          - name: param1
            value: teenagerAttachmentScheduleFired.closeOnCurrentDate не заполнен
          - name: param2
            value: dateEnd = attach.person_info.birth_date + "количество лет" в srv.teenager_area_type_change.years_count (где srv.teenager_area_type_change.ref_ratype_code_teenager = attach.attachment.ref_ratype_code)  + "количество дней" в значении параметра "Период действия прикрепления после совершеннолетия" (teenagerAttachmentScheduleFired.periodAfterBirthday) минус 1 день.


