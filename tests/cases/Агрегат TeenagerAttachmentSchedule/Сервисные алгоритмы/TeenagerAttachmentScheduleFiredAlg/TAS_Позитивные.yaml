  - case_id: f27fe66c-5441-4460-bc36-55314a84ca31
    title: 1-2. Проверка запуска поиска истекших прикреплений ЗЛ, достигших совершеннолетия. Первый запуск
    description: Описание
    priority: high
    steps:
      - action: 'Дождаться интервал времени teenagerAttachmentScheduleFired.run.controlTimeInterval '
        expected_result: |-
          Система фиксирует начало работы, т.е. создает новую запись:

          srv.run_control.code = 'TASF' (процесс поиска прикреплений ЗЛ, достигших совершеннолетия);
          srv.run_control.host = хост, запустивший команду;
          srv.run_control.start_date = current_timestamp;
          srv.run_control.end_date = null;
          srv.run_control.is_running = 1 (статус запуска процесса - запущен);
          srv.run_control.last_date = current_timestamp.
    pre-conditions:
      - action: |-
          Выполнены условия
          1) teenagerAttachmentScheduleFired.run.mode = 1
          2) текущее время >= teenagerAttachmentScheduleFired.run.beginTime
          3) текущее время <= teenagerAttachmentScheduleFired.run.endTime
          4) В таблице SRV.RUN_CONTROL нет записи с SRV.RUN_CONTROL.CODE = 'TASF'
        expected_result: '- '
    iterations:
      - iteration_id: '1'
        params:
          - name: value
            value: Выполняется первый запуск (в svr.run_control нет записей)
      - iteration_id: '2'
        params:
          - name: value
            value: Выполняется не первый запуск (в svr.run_control запись с SRV.RUN_CONTROL.CODE = 'TASF'  И current_timestamp - SRV.RUN_CONTROL.START_DATE >= teenagerAttachmentScheduleFired.run.startInterval)

